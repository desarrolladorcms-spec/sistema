<!doctype html><html><head><base target="_top"><meta charset="utf-8"><style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#f8fafc;color:#25324b}header{background:linear-gradient(120deg,#075985,#16a34a);color:#fff;padding:18px 22px}.title{font-size:22px;font-weight:950}.sub{font-size:13px;opacity:.85}.toolbar{padding:12px 18px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;gap:10px;flex-wrap:wrap}.toolbar select,.toolbar input{padding:9px 10px;border:1px solid #e5e7eb;border-radius:10px}.btn{border:0;border-radius:10px;padding:9px 12px;background:#16a34a;color:white;font-weight:900;cursor:pointer;text-decoration:none;display:inline-block}.btn.gray{background:#64748b}.btn.red{background:#dc2626}.content{padding:16px 18px}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:14px;box-shadow:0 8px 20px rgba(15,23,42,.05)}.card.sent{opacity:.62}.top{display:flex;justify-content:space-between;gap:10px}.name{font-size:14px;font-weight:900}.meta{font-size:12px;color:#667085;line-height:1.45}.msg{font-size:12px;white-space:pre-wrap;background:#f8fafc;border-radius:12px;padding:10px;margin:10px 0;max-height:150px;overflow:auto}.pill{display:inline-block;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:900;background:#f1f5f9;margin:2px}.green{background:#dcfce7;color:#15803d}.redp{background:#fee2e2;color:#b91c1c}.yellow{background:#fef3c7;color:#92400e}.empty,.loading{padding:20px;text-align:center;color:#94a3b8;background:#fff;border-radius:14px;border:1px dashed #cbd5e1}
</style></head><body><header><div class="title">📲 Centro de WhatsApps</div><div class="sub">Mensajes preparados por el sistema. Sin API oficial, WhatsApp se abre con el texto listo y tú confirmas Enviar.</div></header><div class="toolbar"><button class="btn" onclick="loadData()">↻ Actualizar</button><select id="estado"><option value="NO">Pendientes</option><option value="SI">Enviados</option><option value="DESCARTADO">Descartados</option><option value="">Todos</option></select><input id="q" placeholder="Buscar por persona, número o texto" oninput="render()"></div><div class="content" id="app"><div class="loading">Cargando...</div></div><script src="../assets/api.js"></script>
<script>
let DATA=[];function esc(s){return String(s||'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}function loadData(){document.getElementById('app').innerHTML='<div class="loading">Cargando...</div>';google.script.run.withSuccessHandler(r=>{DATA=r||[];render();}).withFailureHandler(e=>{document.getElementById('app').innerHTML='<div class="loading">Error: '+esc(e.message||e)+'</div>';}).mc_wa_getPendientes_pub();}
function filtered(){let st=document.getElementById('estado').value.toUpperCase(),q=document.getElementById('q').value.toLowerCase();return DATA.filter(x=>(!st||String(x.enviado||'NO').toUpperCase()===st)&&(!q||(String(x.para+' '+x.numero+' '+x.mensaje).toLowerCase().indexOf(q)>=0)));}
function render(){let arr=filtered();if(!arr.length){document.getElementById('app').innerHTML='<div class="empty">Sin mensajes para este filtro.</div>';return;}document.getElementById('app').innerHTML='<div class="cards">'+arr.map(x=>'<div class="card '+(String(x.enviado).toUpperCase()==='SI'?'sent':'')+'"><div class="top"><div><div class="name">'+esc(x.para||'Sin destinatario')+'</div><div class="meta">'+esc(x.numero||'Sin número')+' · '+esc(x.fecha||'')+'</div></div><div><span class="pill '+(String(x.enviado).toUpperCase()==='NO'?'yellow':String(x.enviado).toUpperCase()==='SI'?'green':'redp')+'">'+esc(x.enviado||'NO')+'</span></div></div><div class="msg">'+esc(x.mensaje||'')+'</div>'+(x.link?'<a class="btn" target="_blank" href="'+esc(x.link)+'" onclick="copyMsg('+x.row+',true)">Abrir WhatsApp</a> ':'<span class="pill yellow">Sin número/link: copiar manual</span> ')+'<button class="btn gray" onclick="copyMsg('+x.row+')">Copiar</button> <button class="btn" onclick="sent('+x.row+')">Marcar enviado</button> <button class="btn red" onclick="drop('+x.row+')">Descartar</button></div>').join('')+'</div>';}
function find(row){return DATA.find(x=>Number(x.row)===Number(row))||{};}
function nice(msg,opts){opts=opts||{}; if(window.cmsNotify) window.cmsNotify(msg,opts); else alert(msg);}
function ask(msg,onOk){ if(window.cmsNotify) window.cmsNotify(msg,{title:'Confirmar acción',icon:'🗑️',okText:'Sí, descartar',cancelText:'Cancelar',onOk:onOk}); else onOk();}
function copyMsg(row,silent){let x=find(row); if(navigator.clipboard)navigator.clipboard.writeText(x.mensaje||''); if(!silent) nice('Mensaje copiado',{title:'Copiado',icon:'📋'});}
function sent(row){google.script.run.withSuccessHandler(function(){nice('Mensaje marcado como enviado',{title:'WhatsApp actualizado',icon:'✅',onOk:loadData});}).withFailureHandler(function(e){nice(e.message||e,{title:'Error',icon:'❌'});}).mc_wa_marcarEnviado_pub(row)}
function drop(row){ask('¿Descartar este mensaje? No se eliminará la fila, solo quedará como DESCARTADO.',function(){google.script.run.withSuccessHandler(function(){nice('Mensaje descartado',{title:'WhatsApp actualizado',icon:'🗑️',onOk:loadData});}).withFailureHandler(function(e){nice(e.message||e,{title:'Error',icon:'❌'});}).mc_wa_descartar_pub(row);});}
document.getElementById('estado').addEventListener('change',render);loadData();
</script>
<script>
(function(){
  if(window.__cmsVisualNotifyInstalled) return;
  window.__cmsVisualNotifyInstalled = true;
  function ensureNotify(){
    var cssId='cmsNotifyCss';
    if(!document.getElementById(cssId)){
      var st=document.createElement('style'); st.id=cssId;
      st.textContent='.cms-notify-overlay{position:fixed;inset:0;background:rgba(15,23,42,.48);display:none;align-items:center;justify-content:center;z-index:99999;padding:22px}.cms-notify-card{width:min(460px,calc(100vw - 44px));background:rgba(255,255,255,.96);border:1px solid rgba(255,255,255,.75);box-shadow:0 26px 85px rgba(15,23,42,.28);border-radius:28px;padding:26px;text-align:center;font-family:Arial,sans-serif;color:#1f2937}.cms-notify-icon{width:74px;height:74px;border-radius:999px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,#ede9fe,#dbeafe);box-shadow:0 12px 34px rgba(124,58,237,.22)}.cms-notify-title{font-size:23px;font-weight:900;margin:0 0 7px;color:#111827}.cms-notify-msg{font-size:14px;line-height:1.55;color:#64748b;white-space:pre-line;margin:0 0 18px}.cms-notify-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.cms-notify-btn{border:0;border-radius:15px;padding:12px 20px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#7c3aed,#9333ea);color:#fff;box-shadow:0 14px 26px rgba(124,58,237,.24)}.cms-notify-btn.secondary{background:#fff;color:#4c1d95;border:1px solid #e5e7eb;box-shadow:0 10px 22px rgba(15,23,42,.08)}';
      document.head.appendChild(st);
    }
    var ov=document.getElementById('cmsNotifyOverlay');
    if(!ov){
      ov=document.createElement('div'); ov.id='cmsNotifyOverlay'; ov.className='cms-notify-overlay';
      ov.innerHTML='<div class="cms-notify-card"><div class="cms-notify-icon" id="cmsNotifyIcon">✅</div><h2 class="cms-notify-title" id="cmsNotifyTitle">Listo</h2><p class="cms-notify-msg" id="cmsNotifyMsg"></p><div class="cms-notify-actions" id="cmsNotifyActions"><button class="cms-notify-btn" id="cmsNotifyOk">Aceptar</button></div></div>';
      document.body.appendChild(ov);
    }
    return ov;
  }
  window.cmsNotify=function(msg, opts){
    opts=opts||{}; var ov=ensureNotify();
    document.getElementById('cmsNotifyIcon').textContent=opts.icon||'✅';
    document.getElementById('cmsNotifyTitle').textContent=opts.title||'Listo';
    document.getElementById('cmsNotifyMsg').textContent=String(msg||'');
    var actions=document.getElementById('cmsNotifyActions');
    actions.innerHTML='';
    var ok=document.createElement('button'); ok.className='cms-notify-btn'; ok.textContent=opts.okText||'Aceptar';
    ok.onclick=function(){ov.style.display='none'; if(typeof opts.onOk==='function') opts.onOk();};
    actions.appendChild(ok);
    if(opts.cancelText){ var c=document.createElement('button'); c.className='cms-notify-btn secondary'; c.textContent=opts.cancelText; c.onclick=function(){ov.style.display='none'; if(typeof opts.onCancel==='function') opts.onCancel();}; actions.insertBefore(c,ok); }
    ov.style.display='flex';
  };
  window.alert=function(msg){ window.cmsNotify(msg,{title:'Aviso del sistema', icon:'🔔'}); };
})();
</script>

</body></html>
