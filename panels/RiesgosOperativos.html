<!doctype html><html><head><base target="_top"><meta charset="utf-8"><style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#fff7ed;color:#111827}.top{padding:22px 26px;background:linear-gradient(120deg,#450a0a,#b91c1c,#f97316);color:#fff}.title{font-size:22px;font-weight:950}.sub{font-size:12px;opacity:.84}.wrap{padding:18px 22px}.toolbar{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-bottom:14px}.btn{border:0;border-radius:12px;background:#dc2626;color:#fff;font-weight:900;padding:10px 14px;cursor:pointer}.filters{display:flex;gap:8px}.chip{border:1px solid #fed7aa;background:#fff;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800;cursor:pointer}.chip.on{background:#dc2626;color:#fff;border-color:#dc2626}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}.card{background:#fff;border:1px solid #fed7aa;border-radius:18px;padding:14px;box-shadow:0 10px 24px rgba(124,45,18,.08)}.head{display:flex;justify-content:space-between;gap:10px}.client{font-weight:950;color:#7f1d1d}.pill{border-radius:999px;padding:3px 8px;font-size:10px;font-weight:900}.Alta,.Urgente{background:#fee2e2;color:#b91c1c}.Media{background:#fef3c7;color:#92400e}.Baja{background:#dcfce7;color:#166534}.risk{font-weight:800;margin-top:8px}.meta{font-size:12px;color:#64748b;margin-top:5px;line-height:1.45}.action{margin-top:10px;border-left:4px solid #f97316;padding:8px 10px;background:#fff7ed;border-radius:10px;font-size:12px;font-weight:700}.empty,.loading{text-align:center;padding:46px;color:#9a3412;background:#fff;border:1px dashed #fdba74;border-radius:18px}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}.kpi{background:#fff;border:1px solid #fed7aa;border-radius:16px;padding:12px}.kpi b{font-size:28px;color:#dc2626;display:block}.kpi span{font-size:11px;color:#9a3412;font-weight:800;text-transform:uppercase}@media(max-width:800px){.summary{grid-template-columns:1fr}.toolbar{display:block}.filters{margin-top:10px;flex-wrap:wrap}}
</style></head><body><div class="top"><div class="title">🚨 Riesgos Operativos</div><div class="sub">Tareas vencidas, tickets sin responsable, urgencias y WhatsApps pendientes.</div></div><div class="wrap"><div class="toolbar"><button class="btn" onclick="load()">↻ Actualizar riesgos</button><div class="filters"><button class="chip on" onclick="setFilter('')">Todos</button><button class="chip" onclick="setFilter('Alta')">Alta</button><button class="chip" onclick="setFilter('Media')">Media</button></div></div><div id="app" class="loading">Analizando riesgos...</div></div><script src="../assets/api.js"></script>
<script>
var DATA=[],FILTER='';function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]})}function setFilter(f){FILTER=f;Array.prototype.forEach.call(document.querySelectorAll('.chip'),function(b){b.classList.remove('on')});event.target.classList.add('on');render({ok:true,items:DATA})}
function render(d){if(!d||d.ok===false){app.innerHTML='<div class="empty">'+esc(d&&d.msg||'Error')+'</div>';return}DATA=d.items||DATA||[];var items=FILTER?DATA.filter(function(x){return String(x.nivel||'').toLowerCase()===FILTER.toLowerCase()}):DATA;var alta=DATA.filter(function(x){return /alta|urgente/i.test(x.nivel)}).length,media=DATA.filter(function(x){return /media/i.test(x.nivel)}).length;var html='<div class="summary"><div class="kpi"><b>'+DATA.length+'</b><span>Total riesgos</span></div><div class="kpi"><b>'+alta+'</b><span>Alta prioridad</span></div><div class="kpi"><b>'+media+'</b><span>Media prioridad</span></div></div>';if(!items.length){app.innerHTML=html+'<div class="empty">✅ No hay riesgos para este filtro.</div>';return}html+='<div class="grid">';items.forEach(function(x){html+='<div class="card"><div class="head"><div class="client">'+esc(x.cliente||'Sin cliente')+'</div><span class="pill '+esc(x.nivel||'Media')+'">'+esc(x.nivel||'Media')+'</span></div><div class="risk">'+esc(x.riesgo||'Riesgo operativo')+'</div><div class="meta">'+esc(x.area||'')+' · '+esc(x.responsable||'Sin responsable')+' · '+esc(x.ref||'')+'</div><div class="meta">'+esc(x.motivo||'')+'</div><div class="action">✅ '+esc(x.accion||'Revisar y actualizar estado')+'</div></div>'});html+='</div>';app.innerHTML=html}
function load(){app.innerHTML='<div class="loading">Analizando riesgos...</div>';google.script.run.withSuccessHandler(render).withFailureHandler(function(e){render({ok:false,msg:e.message})}).mc_riesgos_getData_pub()}load();
</script></body></html>
