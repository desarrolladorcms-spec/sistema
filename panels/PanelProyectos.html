<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#F8F5FF;color:#1A0A36;font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
:root{--v:#9333EA;--vl:#F5F3FF;--dark:#1A0A36;--gold:#FDE68A}

.hdr{background:linear-gradient(120deg,#1A0A36,#3b0764);color:#fff;padding:11px 16px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:15px;font-weight:700;color:var(--gold)}
.tabs{display:flex;gap:2px;background:rgba(255,255,255,.1);border-radius:8px;padding:2px}
.tab{padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;color:rgba(255,255,255,.6);border:none;background:none}
.tab.act{background:var(--v);color:#fff}

.scroll{flex:1;overflow-y:auto;padding:12px}

/* Semáforo */
.sem-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin-bottom:14px}
.sem-card{background:#fff;border-radius:10px;border:1.5px solid #E5E7EB;padding:12px;border-left-width:5px;cursor:pointer;transition:box-shadow .15s}
.sem-card:hover{box-shadow:0 4px 14px rgba(147,51,234,.15)}
.sem-card.verde{border-left-color:#059669}
.sem-card.amarillo{border-left-color:#D97706}
.sem-card.rojo{border-left-color:#DC2626}
.sem-card.gris{border-left-color:#9CA3AF;opacity:.6}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.sc-titulo{font-size:13px;font-weight:700;line-height:1.3;flex:1;margin-right:8px}
.sc-semaforo{font-size:18px;flex-shrink:0}
.sc-marca{font-size:10px;color:#78716C;margin-bottom:5px}
.sc-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.tag{font-size:9px;padding:2px 7px;border-radius:99px;background:#F3F4F6;color:#374151;font-weight:600}
.progress-bar{height:6px;background:#F3F4F6;border-radius:99px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--v),#059669)}
.sc-bottom{display:flex;justify-content:space-between;font-size:10px;color:#9CA3AF}

/* Filtros semáforo */
.filtros{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.filt-btn{padding:4px 11px;border-radius:99px;border:1.5px solid #E5E7EB;background:#fff;cursor:pointer;font-size:11px;font-weight:600}
.filt-btn.act{background:var(--v);color:#fff;border-color:var(--v)}
.btn-nuevo{background:var(--v);color:#fff;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600;margin-left:auto}
.btn-nuevo:hover{opacity:.9}

/* KPIs */
.kpi-section{margin-bottom:16px}
.kpi-title{font-size:12px;font-weight:700;color:var(--dark);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
.kpi-card{background:#fff;border-radius:8px;border:1px solid #E5E7EB;padding:10px;text-align:center}
.kpi-val{font-size:20px;font-weight:800;color:var(--v)}
.kpi-lbl{font-size:9px;color:#78716C;margin-top:2px;line-height:1.3}

/* Tabla de tiempo */
.tabla{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;margin-bottom:14px;font-size:11px}
.tabla th{background:#1A0A36;color:#FDE68A;padding:7px 10px;text-align:left;font-weight:600;font-size:10px}
.tabla td{padding:7px 10px;border-bottom:1px solid #F3F4F6}
.tabla tr:last-child td{border-bottom:none}
.tabla tr:hover td{background:#F8F5FF}
.tiempo-bar{height:4px;background:var(--vl);border-radius:2px;margin-top:3px}
.tiempo-fill{height:4px;background:var(--v);border-radius:2px}

/* Mes selector */
.mes-sel{display:flex;gap:6px;align-items:center;margin-bottom:12px}
.mes-sel select{padding:5px 8px;border:1.5px solid #E2E8F0;border-radius:6px;font-size:11px}
.mes-sel label{font-size:11px;color:#78716C;font-weight:600}

/* Estados */
.empty{color:#9CA3AF;font-size:12px;text-align:center;padding:30px;background:#fff;border-radius:10px}
.loading{color:#9CA3AF;text-align:center;padding:30px;font-size:12px}

/* Panel proyecto detalle */
.detalle-back{font-size:11px;color:var(--v);cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:4px}
.detalle-hdr{background:#fff;border-radius:10px;padding:14px;border:1.5px solid #E5E7EB;margin-bottom:10px}
.detalle-titulo{font-size:16px;font-weight:800;margin-bottom:4px}
.detalle-meta{font-size:11px;color:#78716C;display:flex;gap:10px;flex-wrap:wrap}
.items-tabla{}
.item-row{background:#fff;border-radius:8px;border:1.5px solid #E5E7EB;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.item-estado{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.est-complet{background:#059669}
.est-proceso{background:#1D4ED8}
.est-bloqueo{background:#DC2626}
.est-pend{background:#D97706}
.item-nombre{flex:1;font-size:12px;font-weight:600}
.item-sub{font-size:10px;color:#78716C}
.item-dur{font-size:11px;color:var(--v);font-weight:700;white-space:nowrap}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">📦 Proyectos</div>
  <div class="tabs">
    <button class="tab act" onclick="cambiarTab('semaforo',this)">🚦 Semáforo</button>
    <button class="tab" onclick="cambiarTab('kpi',this)">📊 KPIs</button>
  </div>
</div>

<div class="scroll" id="scroll">
  <div class="loading">Cargando proyectos...</div>
</div>

<script src="../assets/api.js"></script>
<script>
var SEMAFORO_DATA = null;
var KPIS_DATA = null;
var TAB = 'semaforo';
var FILTRO_SEM = 'todos';
var DETALLE_PROY = null;
var MES_SEL = '';

function esc(x){return String(x||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];})}

// ── Tabs ─────────────────────────────────────────────────────────────────────
function cambiarTab(tab, el){
  TAB = tab;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('act');});
  el.classList.add('act');
  DETALLE_PROY = null;
  render();
}

// ── Render principal ─────────────────────────────────────────────────────────
function render(){
  if(DETALLE_PROY){ renderDetalle(); return; }
  if(TAB==='semaforo') renderSemaforo();
  else renderKpis();
}

// ── Semáforo ─────────────────────────────────────────────────────────────────
function renderSemaforo(){
  var scr = document.getElementById('scroll');
  if(!SEMAFORO_DATA){ scr.innerHTML='<div class="loading">Cargando...</div>'; return; }
  var all = SEMAFORO_DATA.proyectos||[];
  var filtrados = FILTRO_SEM==='todos' ? all : all.filter(function(p){return p.semaforo===FILTRO_SEM;});
  var cnts = {rojo:0,amarillo:0,verde:0,gris:0};
  all.forEach(function(p){ if(cnts[p.semaforo]!==undefined) cnts[p.semaforo]++; });

  var html = '<div class="filtros">';
  html += btn('todos','Todos ('+all.length+')');
  html += btn('rojo','🔴 '+cnts.rojo);
  html += btn('amarillo','🟡 '+cnts.amarillo);
  html += btn('verde','🟢 '+cnts.verde);
  if(cnts.gris) html += btn('gris','⚫ '+cnts.gris);
  html += '<button class="btn-nuevo" onclick="abrirNuevoProyecto()">＋ Nuevo proyecto</button>';
  html += '</div>';

  if(!filtrados.length){
    html+='<div class="empty">No hay proyectos con ese filtro.</div>';
  } else {
    html+='<div class="sem-grid">';
    filtrados.forEach(function(p){ html+=renderCard(p); });
    html+='</div>';
  }
  scr.innerHTML=html;
}

function btn(val,lbl){
  return '<button class="filt-btn'+(FILTRO_SEM===val?' act':'')+'" onclick="setFiltro(\''+val+'\')">'+lbl+'</button>';
}
function setFiltro(v){ FILTRO_SEM=v; renderSemaforo(); }

function semaforoIcon(s){ return s==='rojo'?'🔴':s==='amarillo'?'🟡':s==='verde'?'🟢':'⚫'; }

function renderCard(p){
  var pct = p.pct||0;
  var barColor = pct>=100?'#059669':pct>=50?'#9333EA':'#D97706';
  var alertas = [];
  if(p.diasAlLim!==null && p.diasAlLim<=3 && p.diasAlLim>=0) alertas.push('<span class="tag" style="background:#FEF9C3;color:#92400E">⏰ '+p.diasAlLim+'d p/límite</span>');
  if(p.diasAlLim!==null && p.diasAlLim<0) alertas.push('<span class="tag" style="background:#FEE2E2;color:#DC2626">⏰ Vencido '+Math.abs(p.diasAlLim)+'d</span>');
  if(p.diasSinMov!==null && p.diasSinMov>3) alertas.push('<span class="tag" style="background:#FEE2E2;color:#DC2626">🛑 Sin mover '+p.diasSinMov+'d</span>');
  return '<div class="sem-card '+p.semaforo+'" onclick="verDetalle(\''+esc(p.id)+'\')">' +
    '<div class="sc-top"><div class="sc-titulo">'+esc(p.proyecto)+'</div><div class="sc-semaforo">'+semaforoIcon(p.semaforo)+'</div></div>'+
    '<div class="sc-marca">'+esc(p.marca)+'</div>'+
    '<div class="sc-meta">'+
      '<span class="tag">'+esc(p.tipo||'Web')+'</span>'+
      '<span class="tag">'+esc(p.resp||'—')+'</span>'+
      '<span class="tag" style="background:'+(p.estado==='Pendiente'?'#F3F4F6':p.estado==='En proceso'?'#EFF6FF':'#D1FAE5')+';color:'+(p.estado==='Pendiente'?'#374151':p.estado==='En proceso'?'#1D4ED8':'#065F46')+'">'+esc(p.estado)+'</span>'+
      alertas.join('')+
    '</div>'+
    '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>'+
    '<div class="sc-bottom"><span>'+p.hechas+'/'+p.total+' ítems</span><span>'+(p.limite?'Límite: '+p.limite:'Sin fecha')+'</span></div>'+
  '</div>';
}

// ── Detalle proyecto ─────────────────────────────────────────────────────────
function verDetalle(proyId){
  var p = (SEMAFORO_DATA&&SEMAFORO_DATA.proyectos||[]).find(function(x){return x.id===proyId;});
  if(!p) return;
  DETALLE_PROY = p;
  render();
}

function renderDetalle(){
  var p = DETALLE_PROY;
  var scr = document.getElementById('scroll');
  scr.innerHTML = '<div class="detalle-back" onclick="volverLista()">← Volver al semáforo</div>'+
    '<div class="detalle-hdr">'+
      '<div class="detalle-titulo">'+semaforoIcon(p.semaforo)+' '+esc(p.proyecto)+'</div>'+
      '<div class="detalle-meta">'+
        '<span>🏷️ '+esc(p.marca)+'</span>'+
        '<span>📌 '+esc(p.tipo)+'</span>'+
        '<span>👩 '+esc(p.resp)+'</span>'+
        '<span>🚦 '+esc(p.estado)+'</span>'+
        (p.limite?'<span>⏰ '+p.limite+'</span>':'')+
        '<span>📊 '+p.pct+'% completado</span>'+
      '</div>'+
    '</div>'+
    '<div class="loading" id="detalleItems">Cargando ítems...</div>';
  // Cargar ítems del proyecto
  google.script.run
    .withSuccessHandler(function(items){
      var cont = document.getElementById('detalleItems');
      if(!items||!items.length){ cont.innerHTML='<div class="empty">Sin ítems registrados para este proyecto.<br>Usa ＋ Nuevo proyecto para crear ítems desde plantilla.</div>'; return; }
      var html = items.map(function(it){
        var cls = /complet/i.test(it.estado)?'est-complet':/proceso/i.test(it.estado)?'est-proceso':/bloquead/i.test(it.estado)?'est-bloqueo':'est-pend';
        return '<div class="item-row">'+
          '<div class="item-estado '+cls+'"></div>'+
          '<div style="flex:1">'+
            '<div class="item-nombre">'+esc(it.nombre)+'</div>'+
            '<div class="item-sub">'+esc(it.tipoItem)+(it.responsable?' · '+esc(it.responsable):'')+(it.bloqueadoPor?' 🚫 '+esc(it.bloqueadoPor):'')+'</div>'+
          '</div>'+
          '<div class="item-dur">'+(it.tiempoMin?it.tiempoMin+'min':'—')+'</div>'+
        '</div>';
      }).join('');
      cont.innerHTML=html;
    })
    .withFailureHandler(function(){ document.getElementById('detalleItems').innerHTML='<div class="empty">Error cargando ítems.</div>'; })
    .mc_pub_v2436_getItemsPorProyecto(p.id);
}

function volverLista(){ DETALLE_PROY=null; render(); }

// ── KPIs ─────────────────────────────────────────────────────────────────────
function renderKpis(){
  var scr = document.getElementById('scroll');
  if(!KPIS_DATA){ scr.innerHTML='<div class="loading">Cargando KPIs...</div>'; cargarKpis(); return; }
  var k = KPIS_DATA.kpi||{};
  var html = '<div class="mes-sel"><label>Mes:</label><select onchange="cambiarMes(this.value)" id="mesSel">'+mesoptions()+'</select></div>';

  // Resumen general
  html += '<div class="kpi-grid" style="margin-bottom:14px">';
  html += kpiCard(k.ticketsResueltos||0,'Tickets soporte resueltos');
  html += kpiCard(k.ticketsEntrados||0,'Tickets soporte entrados');
  var blq = k.bloqueos||{};
  html += kpiCard((blq.Cliente||0),'Bloqueos por cliente');
  html += kpiCard((blq.Interno||0),'Bloqueos internos');
  html += '</div>';

  // Tiempo por tipo de ítem (proyectos)
  if(Object.keys(k.tiempoXTipo||{}).length){
    html += '<div class="kpi-title">⏱️ Tiempo promedio por tipo de ítem (Web/SEO)</div>';
    html += tablaKpi(k.tiempoXTipo,'Tipo de ítem');
  }

  // Tiempo por persona
  if(Object.keys(k.tiempoXPersona||{}).length){
    html += '<div class="kpi-title" style="margin-top:12px">👩 Tiempo registrado por persona (proyectos)</div>';
    html += tablaKpi(k.tiempoXPersona,'Persona');
  }

  // Soporte por tipo
  if(Object.keys(k.soporteXTipo||{}).length){
    html += '<div class="kpi-title" style="margin-top:12px">🛠️ Soporte — tiempo por tipo</div>';
    html += tablaKpi(k.soporteXTipo,'Tipo de soporte');
  }

  // Soporte por cliente
  if(Object.keys(k.soporteXCliente||{}).length){
    html += '<div class="kpi-title" style="margin-top:12px">🏷️ Soporte — tiempo por cliente</div>';
    html += tablaKpi(k.soporteXCliente,'Cliente');
  }

  scr.innerHTML=html;
}

function kpiCard(val,lbl){
  return '<div class="kpi-card"><div class="kpi-val">'+val+'</div><div class="kpi-lbl">'+esc(lbl)+'</div></div>';
}

function tablaKpi(obj,labelCol){
  var items = Object.keys(obj).map(function(k){ return {label:k,data:obj[k]}; });
  items.sort(function(a,b){ return b.data.total-a.data.total; });
  var max = items.length ? items[0].data.total : 1;
  var html = '<table class="tabla"><thead><tr><th>'+esc(labelCol)+'</th><th>Total min</th><th>Prom. min</th><th>Tareas</th></tr></thead><tbody>';
  items.forEach(function(it){
    var d = it.data;
    var prom = d.count ? Math.round(d.total/d.count) : 0;
    var pct = max ? Math.round(d.total/max*100) : 0;
    html += '<tr><td>'+esc(it.label)+'<div class="tiempo-bar"><div class="tiempo-fill" style="width:'+pct+'%"></div></div></td>'+
      '<td><b>'+d.total+'</b></td><td>'+prom+'</td><td>'+d.count+'</td></tr>';
  });
  return html+'</tbody></table>';
}

function mesoptions(){
  var now=new Date(), opts='<option value="">Todos los meses</option>';
  for(var i=-2;i<=1;i++){
    var d=new Date(now.getFullYear(),now.getMonth()+i,1);
    var v=d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1);
    opts+='<option value="'+v+'"'+(v===MES_SEL?' selected':'')+'>'+v+'</option>';
  }
  return opts;
}

function cambiarMes(mes){ MES_SEL=mes; KPIS_DATA=null; cargarKpis(); }

// ── Nuevo proyecto ────────────────────────────────────────────────────────────
function abrirNuevoProyecto(){
  parent.go('FormNuevoProyecto','＋','Nuevo Proyecto');
}

// ── Carga de datos ────────────────────────────────────────────────────────────
function cargarSemaforo(){
  google.script.run
    .withSuccessHandler(function(d){SEMAFORO_DATA=d;if(TAB==='semaforo')renderSemaforo();})
    .withFailureHandler(function(e){document.getElementById('scroll').innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>';})
    .mc_pub_v2436_getSemaforo();
}

function cargarKpis(){
  google.script.run
    .withSuccessHandler(function(d){KPIS_DATA=d;if(TAB==='kpi')renderKpis();})
    .withFailureHandler(function(e){document.getElementById('scroll').innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>';})
    .mc_pub_v2436_getKpis(MES_SEL);
}

// Cargar ambos al inicio
cargarSemaforo();
cargarKpis();
</script>
</body>
</html>
