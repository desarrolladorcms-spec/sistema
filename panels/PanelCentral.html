<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0F0820;color:#fff;font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
:root{--v:#9333EA;--gold:#FDE68A;--rojo:#DC2626;--amarillo:#D97706;--verde:#059669}

/* Header */
.hdr{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.08)}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-title{font-size:18px;font-weight:800;color:var(--gold)}
.hdr-fecha{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.hdr-right{display:flex;gap:8px}
.btn-hdr{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.8);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:600}
.btn-hdr:hover{background:rgba(255,255,255,.2)}
.btn-midia{background:var(--v);color:#fff}

/* Alertas */
.alertas{display:flex;gap:8px;padding:10px 20px;flex-shrink:0}
.alerta{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 14px;cursor:pointer;flex:1;transition:background .15s}
.alerta:hover{background:rgba(255,255,255,.1)}
.alerta.urgente{border-color:var(--rojo);background:rgba(220,38,38,.15)}
.alerta-n{font-size:22px;font-weight:800;color:var(--gold)}
.alerta-lbl{font-size:11px;color:rgba(255,255,255,.6)}
.alerta-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700;margin-left:auto}

/* Grid principal */
.main{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr auto;gap:10px;padding:0 20px 14px;overflow:hidden}

/* Cards */
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
.card-title{padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.card-body{flex:1;overflow-y:auto;padding:6px 0}
.card-full{grid-column:1/-1}

/* Rows */
.row-item{padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:flex-start;gap:8px}
.row-item:last-child{border-bottom:none}
.row-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-rojo{background:var(--rojo)}
.dot-amarillo{background:var(--amarillo)}
.dot-verde{background:var(--verde)}
.dot-gris{background:#6B7280}
.dot-demo{background:#8B5CF6}
.dot-sol{background:#EA580C}
.row-text{flex:1;min-width:0}
.row-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.row-sub{font-size:10px;color:rgba(255,255,255,.4)}
.row-right{font-size:10px;color:rgba(255,255,255,.3);white-space:nowrap;flex-shrink:0;text-align:right}

/* Equipo */
.persona{padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04)}
.persona-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.persona-nombre{font-size:12px;font-weight:700}
.persona-total{font-size:10px;background:rgba(255,255,255,.1);padding:1px 8px;border-radius:99px}
.persona-items{display:flex;flex-direction:column;gap:2px}
.persona-item{font-size:10px;color:rgba(255,255,255,.5);padding-left:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* KPIs */
.kpi-row{display:flex;gap:8px;padding:8px 14px}
.kpi{flex:1;text-align:center}
.kpi-n{font-size:20px;font-weight:800;color:var(--gold)}
.kpi-l{font-size:9px;color:rgba(255,255,255,.4);margin-top:1px}

/* Barra progreso */
.mini-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:4px}
.mini-fill{height:3px;border-radius:2px}

.empty-msg{padding:14px;text-align:center;font-size:11px;color:rgba(255,255,255,.3)}
.loading{padding:20px;text-align:center;font-size:11px;color:rgba(255,255,255,.3)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div>
      <div class="hdr-title">🧠 Panel Central</div>
      <div class="hdr-fecha" id="hdrFecha">Cargando...</div>
    </div>
  </div>
  <div class="hdr-right">
    <button class="btn-hdr" onclick="cargar()">↻ Actualizar</button>
    <button class="btn-hdr btn-midia" onclick="parent.go('PanelMiDia_Master','☀','Mi Día')">📌 Mi Día</button>
    <button class="btn-hdr" onclick="parent.go('MonitorSolicitudes','◎','Monitor')">🔔 Monitor</button>
    <button class="btn-hdr" onclick="parent.go('PanelProyectos','📦','Proyectos')">📦 Proyectos</button>
    <button class="btn-hdr" onclick="parent.go('ReporteMensual','📊','Reporte Mensual')">📊 Reporte</button>
  </div>
</div>

<div class="alertas" id="alertas">
  <div class="loading" style="width:100%">Cargando...</div>
</div>

<div class="main" id="main">
</div>

<script src="../assets/api.js"></script>
<script>
function esc(x){return String(x||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];})}

function render(d){
  if(!d||d.ok===false){
    document.getElementById('alertas').innerHTML='<div class="loading" style="width:100%;color:#DC2626">Error: '+esc(d&&d.msg||'?')+'</div>';
    return;
  }
  // Fecha
  var hoy=new Date();
  document.getElementById('hdrFecha').textContent=
    hoy.toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).replace(/^\w/,function(c){return c.toUpperCase();});

  var sols=d.solicitudes||[], demos=d.demos||[], sem=d.semaforo||[];
  var carga=d.carga||{}, k=d.kpi||{};

  // ── Alertas ──────────────────────────────────────────────────────────
  var alertasHtml='';
  var urgSols=sols.filter(function(s){return /urgente|alta/i.test(s.prioridad||'');});
  var clsA=urgSols.length?'alerta urgente':'alerta';
  alertasHtml+='<div class="'+clsA+'" onclick="parent.go(\'MonitorSolicitudes\',\'◎\',\'Monitor\')">'+
    '<div><div class="alerta-n">'+sols.length+'</div><div class="alerta-lbl">Solicitudes por asignar</div></div>'+
    (urgSols.length?'<span class="alerta-badge" style="background:#DC2626;color:#fff">'+urgSols.length+' urgente'+(urgSols.length>1?'s':'')+'</span>':'<span class="alerta-badge" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)">—</span>')+
  '</div>';
  alertasHtml+='<div class="'+(demos.length?'alerta urgente':'alerta')+'" onclick="parent.go(\'PanelRevisionDemos\',\'🧪\',\'Revisión Demos\')">'+
    '<div><div class="alerta-n">'+demos.length+'</div><div class="alerta-lbl">Demos para revisar</div></div>'+
    (demos.length?'<span class="alerta-badge" style="background:#8B5CF6;color:#fff">Pendiente</span>':'<span class="alerta-badge" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)">Al día</span>')+
  '</div>';
  var rojProy=sem.filter(function(p){return p.semaforo==='rojo';}).length;
  alertasHtml+='<div class="'+(rojProy?'alerta urgente':'alerta')+'" onclick="parent.go(\'PanelProyectos\',\'📦\',\'Proyectos\')">'+
    '<div><div class="alerta-n">'+rojProy+'</div><div class="alerta-lbl">Proyectos en riesgo</div></div>'+
    (rojProy?'<span class="alerta-badge" style="background:#DC2626;color:#fff">Atención</span>':'<span class="alerta-badge" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)">Sin riesgo</span>')+
  '</div>';
  var slaD=k.slaCompliance;
  var slaPct=slaD&&slaD.total?Math.round(slaD.dentroSLA/slaD.total*100):null;
  alertasHtml+='<div class="alerta" onclick="parent.go(\'ReporteMensual\',\'📊\',\'Reporte Mensual\')">'+
    '<div><div class="alerta-n">'+(slaPct!==null?slaPct+'%':'—')+'</div><div class="alerta-lbl">SLA cumplido este mes</div></div>'+
    '<span class="alerta-badge" style="background:'+(slaPct===null?'rgba(255,255,255,.1)':slaPct>=90?'#059669':slaPct>=70?'#D97706':'#DC2626')+';color:#fff">'+(slaPct===null?'—':slaPct>=90?'Bien':slaPct>=70?'Regular':'Revisar')+'</span>'+
  '</div>';
  document.getElementById('alertas').innerHTML=alertasHtml;

  // ── Grid ──────────────────────────────────────────────────────────────
  var html='';

  // Proyectos
  html+='<div class="card"><div class="card-title">📦 Proyectos activos <span style="color:rgba(255,255,255,.4);font-size:10px">'+sem.length+' total</span></div><div class="card-body">';
  if(!sem.length) html+='<div class="empty-msg">Sin proyectos registrados</div>';
  var semConFiltro=sem.filter(function(p){return p.semaforo!=='gris';}).slice(0,6);
  semConFiltro.forEach(function(p){
    var dc=p.semaforo==='rojo'?'dot-rojo':p.semaforo==='amarillo'?'dot-amarillo':'dot-verde';
    var alerta=p.diasAlLim!==null&&p.diasAlLim<=3?'⏰ '+p.diasAlLim+'d':p.diasSinMov>3?'🛑 '+p.diasSinMov+'d sin mover':'';
    html+='<div class="row-item">'+
      '<div class="row-dot '+dc+'"></div>'+
      '<div class="row-text">'+
        '<div class="row-title">'+esc(p.proyecto)+'</div>'+
        '<div class="row-sub">'+esc(p.marca)+' · '+esc(p.resp||'—')+'</div>'+
      '</div>'+
      '<div class="row-right">'+esc(alerta||p.estado)+'<div class="mini-bar"><div class="mini-fill" style="width:'+p.pct+'%;background:'+(p.semaforo==='rojo'?'#DC2626':p.semaforo==='amarillo'?'#D97706':'#059669')+'"></div></div></div>'+
    '</div>';
  });
  html+='</div></div>';

  // Solicitudes pendientes
  html+='<div class="card"><div class="card-title">🔔 Solicitudes por asignar</div><div class="card-body">';
  if(!sols.length) html+='<div class="empty-msg">✅ Sin solicitudes pendientes</div>';
  sols.slice(0,5).forEach(function(s){
    var urgente=/urgente|alta/i.test(s.prioridad||'');
    html+='<div class="row-item">'+
      '<div class="row-dot '+(urgente?'dot-rojo':'dot-sol')+'"></div>'+
      '<div class="row-text">'+
        '<div class="row-title">'+esc(s.marcaRecibida||s.marca||'Sin marca')+'</div>'+
        '<div class="row-sub">'+esc((s.tarea||'').substring(0,60))+'</div>'+
      '</div>'+
      '<div class="row-right">'+esc(s.prioridad||'—')+'</div>'+
    '</div>';
  });
  html+='</div></div>';

  // Equipo
  html+='<div class="card"><div class="card-title">👥 Carga del equipo</div><div class="card-body">';
  ['Camila','Lucy','Rossio'].forEach(function(u){
    var p=carga[u]||{total:0,items:[],soporte:[],totalItems:0,totalSoporte:0};
    html+='<div class="persona">'+
      '<div class="persona-hdr"><span class="persona-nombre">'+u+'</span><span class="persona-total">'+p.total+' pendientes</span></div>'+
      '<div class="persona-items">';
    (p.items||[]).forEach(function(i){html+='<div class="persona-item">🌐 '+esc(i.nombre)+'</div>';});
    (p.soporte||[]).forEach(function(i){html+='<div class="persona-item">🛠️ '+esc(i.nombre)+'</div>';});
    if(!p.total) html+='<div class="persona-item" style="color:rgba(255,255,255,.2)">Sin pendientes 🎉</div>';
    html+='</div></div>';
  });
  html+='</div></div>';

  // KPIs fila inferior
  html+='<div class="card card-full"><div class="card-title">📊 KPIs del mes'+' <span style="color:rgba(255,255,255,.4);font-size:10px">'+esc(d.mes)+'</span></div><div class="card-body"><div class="kpi-row">';
  function kpi(val,lbl,col){return '<div class="kpi"><div class="kpi-n" style="color:'+(col||'#FDE68A')+'">'+val+'</div><div class="kpi-l">'+esc(lbl)+'</div></div>';}
  html+=kpi(k.ticketsEntrados||0,'Tickets soporte entrados');
  html+=kpi(k.ticketsResueltos||0,'Tickets soporte resueltos','#4ADE80');
  var byTipo=k.soporteXTipo||{};
  var tiempoTot=Object.keys(byTipo).reduce(function(a,t){return a+(byTipo[t].total||0);},0);
  html+=kpi(tiempoTot?Math.round(tiempoTot/60)+'h':'—','Horas soporte mes');
  var byPers=k.tiempoXPersona||{};
  var itemsTot=Object.keys(byPers).reduce(function(a,p){return a+(byPers[p].count||0);},0);
  html+=kpi(itemsTot||0,'Ítems de proyectos completados');
  html+=kpi(slaPct!==null?slaPct+'%':'—','SLA cumplido',slaPct===null?'#FDE68A':slaPct>=90?'#4ADE80':slaPct>=70?'#FBBF24':'#F87171');
  var blq=k.bloqueos||{};
  html+=kpi((blq.Cliente||0),'Bloqueos por cliente','#FB923C');
  html+='</div></div></div>';

  document.getElementById('main').innerHTML=html;
}

function cargar(){
  document.getElementById('alertas').innerHTML='<div class="loading" style="width:100%">Actualizando...</div>';
  document.getElementById('main').innerHTML='';
  google.script.run
    .withSuccessHandler(render)
    .withFailureHandler(function(e){document.getElementById('alertas').innerHTML='<div class="loading" style="width:100%;color:#DC2626">Error: '+esc(e.message)+'</div>';})
    .mc_pub_panelCentral_getData();
}
cargar();
</script>
</body>
</html>
