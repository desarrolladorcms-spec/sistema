<!DOCTYPE html><html><head><base target="_top"><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="../assets/api.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F1F5F9;--surface:#fff;--border:#E8ECF0;--text:#0F172A;--muted:#64748B;--faint:#94A3B8;--v:#7C3AED;--vl:#F5F3FF;--green:#059669;--amber:#D97706;--red:#DC2626;--blue:#0284C7}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.hdr{background:linear-gradient(120deg,#1E1B4B,#4C1D95);color:#fff;padding:13px 18px;display:flex;align-items:center;justify-content:space-between}
.hdr-left h1{font-size:15px;font-weight:700;color:#FDE68A}
.hdr-left p{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}
.hdr-right{display:flex;gap:6px}
.btn-hdr{padding:6px 12px;border:none;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600}
.btn-refresh{background:rgba(255,255,255,.15);color:#fff}
.btn-ia{background:#FDE68A;color:#1E1B4B}
.content{padding:14px 16px}

/* ── Tarjeta IA ── */
.ai-card{background:var(--surface);border-radius:14px;border:1.5px solid #DDD6FE;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(124,58,237,.08)}
.ai-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ai-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#7C3AED,#A855F7);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ai-title{font-size:12px;font-weight:700;color:var(--v)}
.ai-sub{font-size:9px;color:var(--faint);margin-top:1px}
.ai-body{font-size:12px;color:#374151;line-height:1.6;white-space:pre-wrap}
.ai-body.loading{color:var(--faint);font-style:italic}
.ai-meta{display:flex;gap:10px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.ai-chip{font-size:9px;background:var(--vl);color:#5B21B6;padding:2px 8px;border-radius:999px;font-weight:600}
.ai-time{font-size:9px;color:var(--faint);margin-left:auto}

/* ── Secciones ── */
.section{margin-bottom:12px}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--faint)}
.sec-count{font-size:9px;background:var(--border);color:var(--muted);padding:1px 7px;border-radius:999px;font-weight:600}

/* ── Item card ── */
.item-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:11px 13px;margin-bottom:6px;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:.15s}
.item-card:hover{box-shadow:0 3px 8px rgba(0,0,0,.07)}
.item-card.urgente{border-left:3px solid var(--red)}
.item-card.alta{border-left:3px solid var(--amber)}
.item-card.en-curso{background:#F0FDF4;border-color:#BBF7D0}
.item-card.bloqueado{background:#FFF7ED;border-color:#FED7AA;opacity:.85}
.item-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.item-nombre{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;flex:1}
.item-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;flex-shrink:0}
.badge-urgente{background:#FEE2E2;color:var(--red)}
.badge-alta{background:#FEF9C3;color:var(--amber)}
.badge-media{background:#DBEAFE;color:var(--blue)}
.badge-en-curso{background:#D1FAE5;color:var(--green)}
.badge-bloqueado{background:#FFF7ED;color:var(--amber)}
.item-meta{font-size:10px;color:var(--muted);margin-bottom:7px}
.item-proj{font-weight:600;color:var(--text)}
.item-actions{display:flex;gap:5px;flex-wrap:wrap}
.act{padding:4px 10px;border:none;border-radius:7px;cursor:pointer;font-size:10px;font-weight:600;transition:.15s}
.act-start{background:#D1FAE5;color:#065F46}
.act-start:hover{background:#A7F3D0}
.act-done{background:var(--v);color:#fff}
.act-done:hover{background:#5B21B6}
.act-block{background:#FEF9C3;color:#92400E}
.act-block:hover{background:#FDE68A}

/* Timer */
.timer-card{background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border:1.5px solid #BBF7D0;border-radius:12px;padding:11px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.timer-icon{font-size:20px}
.timer-info{flex:1}
.timer-tarea{font-size:12px;font-weight:700;color:var(--text)}
.timer-time{font-size:18px;font-weight:800;color:var(--green);font-family:'Courier New',monospace;margin-top:2px}
.btn-stop{padding:7px 14px;background:var(--green);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700}

/* Reuniones */
.reu-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:10px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.reu-time{font-size:13px;font-weight:700;color:var(--v);width:46px;flex-shrink:0}
.reu-info{flex:1}
.reu-title{font-size:12px;font-weight:600}
.reu-meta{font-size:10px;color:var(--muted);margin-top:2px}
.reu-link{padding:4px 10px;background:var(--vl);color:var(--v);border:none;border-radius:7px;cursor:pointer;font-size:10px;font-weight:600;text-decoration:none}

.empty{text-align:center;padding:16px;color:var(--faint);font-size:11px;border:1px dashed var(--border);border-radius:10px}
.loading{text-align:center;padding:24px;color:var(--faint);font-size:11px}
</style></head><body>
<div class="hdr">
  <div class="hdr-left">
    <h1 id="greeting">☀️ Mi Día</h1>
    <p id="fechaHoy">Cargando...</p>
  </div>
  <div class="hdr-right">
    <button class="btn-hdr btn-refresh" onclick="cargar()">↻</button>
    <button class="btn-hdr btn-ia" onclick="analizarIA()" id="btnIA">✨ Analizar</button>
  </div>
</div>

<div class="content">

  <!-- Tarjeta IA Gemini -->
  <div class="ai-card" id="aiCard" style="display:none">
    <div class="ai-header">
      <div class="ai-icon">✨</div>
      <div>
        <div class="ai-title">Agente Mi Día</div>
        <div class="ai-sub">Análisis con Gemini 2.0 Flash · gratuito</div>
      </div>
    </div>
    <div class="ai-body" id="aiBody">Analizando tu día...</div>
    <div class="ai-meta" id="aiMeta" style="display:none">
      <span class="ai-chip" id="aiItems">0 ítems</span>
      <span class="ai-chip" id="aiSoporte">0 tickets</span>
      <span class="ai-chip" id="aiReu">0 reuniones</span>
      <span class="ai-time" id="aiTime"></span>
    </div>
  </div>

  <!-- Timer activo -->
  <div id="timerWrap" style="display:none">
    <div class="timer-card">
      <div class="timer-icon">⏱️</div>
      <div class="timer-info">
        <div class="timer-tarea" id="timerTarea">Trabajando en...</div>
        <div class="timer-time" id="timerDisplay">00:00:00</div>
      </div>
      <button class="btn-stop" onclick="detener()">■ Detener</button>
    </div>
  </div>

  <!-- Ítems del día -->
  <div class="section">
    <div class="sec-header">
      <span class="sec-title">📋 Mis tareas de hoy</span>
      <span class="sec-count" id="cntItems">0</span>
    </div>
    <div id="itemsList"><div class="loading">Cargando ítems...</div></div>
  </div>

  <!-- Reuniones -->
  <div class="section" id="reuSection" style="display:none">
    <div class="sec-header">
      <span class="sec-title">📅 Reuniones de hoy</span>
      <span class="sec-count" id="cntReu">0</span>
    </div>
    <div id="reuList"></div>
  </div>

</div>

<script>
var OP_NOMBRE=(function(){try{return JSON.parse(sessionStorage.getItem('mc_usuario')).nombre||'';}catch(e){return '';}}());
var DATA={}, TIMER_INT=null, TIMER_START=null, TIMER_ITEM=null;

// Saludo según hora
(function(){
  var h=new Date().getHours();
  var g=h<12?'☀️ Buenos días':'🌤️ Buenas tardes';
  document.getElementById('greeting').textContent=g+', '+OP_NOMBRE;
  var dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var hoy=new Date();
  document.getElementById('fechaHoy').textContent=dias[hoy.getDay()]+' '+hoy.getDate()+' de '+meses[hoy.getMonth()]+' '+hoy.getFullYear();
})();

function esc(x){return String(x||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function cargar(){
  document.getElementById('itemsList').innerHTML='<div class="loading">Cargando...</div>';
  google.script.run.withSuccessHandler(render)
    .withFailureHandler(function(e){document.getElementById('itemsList').innerHTML='<div class="loading">Error: '+esc(e.message)+'</div>';})
    .mc_pub_v2436_getMiDia({usuario:OP_NOMBRE});
}

function render(d){
  DATA=d||{};
  var items=(DATA.items||[]);
  var reu=(DATA.reuniones||[]);
  document.getElementById('cntItems').textContent=items.length;

  // Timer activo
  var activo=items.find(function(i){return /en curso|iniciado/i.test(i.estado||'');});
  if(activo){
    document.getElementById('timerWrap').style.display='block';
    document.getElementById('timerTarea').textContent=activo.nombre||'Ítem activo';
    TIMER_ITEM=activo;
    var inicio=activo.timerInicio?new Date(activo.timerInicio):new Date();
    TIMER_START=inicio;
    if(TIMER_INT) clearInterval(TIMER_INT);
    TIMER_INT=setInterval(function(){
      var seg=Math.floor((new Date()-TIMER_START)/1000);
      var h=Math.floor(seg/3600),m=Math.floor((seg%3600)/60),s=seg%60;
      document.getElementById('timerDisplay').textContent=
        (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    },1000);
  } else {
    document.getElementById('timerWrap').style.display='none';
    if(TIMER_INT){clearInterval(TIMER_INT);TIMER_INT=null;}
  }

  // Ítems
  if(!items.length){
    document.getElementById('itemsList').innerHTML='<div class="empty">✅ Sin ítems pendientes para hoy</div>';
  } else {
    var html='';
    items.forEach(function(it){
      var prio=(it.prioridad||'Media').toLowerCase();
      var est=(it.estado||'').toLowerCase();
      var isActivo=/en curso|iniciado/.test(est);
      var isBloq=/bloqueado/.test(est);
      var cls=isBloq?'bloqueado':isActivo?'en-curso':prio==='urgente'?'urgente':prio==='alta'?'alta':'';
      html+='<div class="item-card '+cls+'">';
      html+='<div class="item-row1"><div class="item-nombre">'+esc(it.nombre||it.tarea||'Ítem')+'</div>';
      if(isActivo) html+='<span class="item-badge badge-en-curso">⏱ En curso</span>';
      else if(isBloq) html+='<span class="item-badge badge-bloqueado">⚠️ Bloqueado</span>';
      else if(prio==='urgente') html+='<span class="item-badge badge-urgente">🔴 Urgente</span>';
      else if(prio==='alta') html+='<span class="item-badge badge-alta">🟠 Alta</span>';
      html+='</div>';
      html+='<div class="item-meta"><span class="item-proj">'+esc(it.proyecto||'—')+'</span>';
      if(it.cliente) html+=' · '+esc(it.cliente);
      if(it.fechaLimite) html+=' · Vence: '+esc(it.fechaLimite);
      html+='</div>';
      html+='<div class="item-actions">';
      if(!isActivo&&!isBloq) html+='<button class="act act-start" onclick="iniciar(\''+esc(it.id)+'\')">▶ Iniciar</button>';
      if(isActivo){
        html+='<button class="act act-done" onclick="terminar(\''+esc(it.id)+'\')">✓ Terminar</button>';
        html+='<button class="act act-block" onclick="bloquear(\''+esc(it.id)+'\')">⚠ Bloquear</button>';
      }
      if(!isActivo&&!isBloq) html+='<button class="act act-done" onclick="terminar(\''+esc(it.id)+'\')">✓ Listo</button>';
      html+='</div></div>';
    });
    document.getElementById('itemsList').innerHTML=html;
  }

  // Reuniones
  if(reu.length){
    document.getElementById('reuSection').style.display='block';
    document.getElementById('cntReu').textContent=reu.length;
    var rhtml='';
    reu.forEach(function(r){
      rhtml+='<div class="reu-card">';
      rhtml+='<div class="reu-time">'+esc(r.horaInicio||'—')+'</div>';
      rhtml+='<div class="reu-info"><div class="reu-title">'+esc(r.titulo||r.tipo||'Reunión')+'</div>';
      if(r.participantes) rhtml+='<div class="reu-meta">👥 '+esc(r.participantes)+'</div>';
      rhtml+='</div>';
      if(r.link) rhtml+='<a class="reu-link" href="'+esc(r.link)+'" target="_blank">📹 Meet</a>';
      rhtml+='</div>';
    });
    document.getElementById('reuList').innerHTML=rhtml;
  }
}

function iniciar(id){
  google.script.run.withSuccessHandler(cargar)
    .mc_pub_v2436_iniciarItem({id:id,usuario:OP_NOMBRE});
}
function terminar(id){
  google.script.run.withSuccessHandler(cargar)
    .mc_pub_v2436_terminarItem({id:id,usuario:OP_NOMBRE});
}
function bloquear(id){
  var motivo=prompt('¿Por qué está bloqueado?\n(Ej: Esperando contenido del cliente)');
  if(!motivo) return;
  google.script.run.withSuccessHandler(cargar)
    .mc_pub_v2436_bloquearItem({id:id,motivo:motivo,usuario:OP_NOMBRE});
}
function detener(){
  if(TIMER_ITEM) terminar(TIMER_ITEM.id);
}

// ── Agente IA con Gemini ─────────────────────────────────────────────────────
function analizarIA(){
  var card=document.getElementById('aiCard');
  var body=document.getElementById('aiBody');
  var btn=document.getElementById('btnIA');
  card.style.display='block';
  body.className='ai-body loading';
  body.textContent='✨ Gemini está analizando tu día...';
  document.getElementById('aiMeta').style.display='none';
  btn.disabled=true;btn.textContent='Analizando...';
  card.scrollIntoView({behavior:'smooth',block:'start'});

  google.script.run
    .withSuccessHandler(function(r){
      btn.disabled=false;btn.textContent='✨ Analizar';
      if(r&&r.ok){
        body.className='ai-body';
        body.textContent=r.briefing||'Sin análisis disponible';
        document.getElementById('aiItems').textContent=(r.items||0)+' ítems';
        document.getElementById('aiSoporte').textContent=(r.soporte||0)+' tickets';
        document.getElementById('aiReu').textContent=(r.reuniones||0)+' reuniones';
        document.getElementById('aiTime').textContent='Actualizado '+new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
        document.getElementById('aiMeta').style.display='flex';
      } else {
        body.className='ai-body';
        body.textContent='⚠️ '+(r&&r.msg||'No se pudo obtener el análisis. Verifica que GEMINI_API_KEY esté configurado.');
      }
    })
    .withFailureHandler(function(e){
      btn.disabled=false;btn.textContent='✨ Analizar';
      body.className='ai-body';
      body.textContent='⚠️ Error: '+e.message;
    })
    .mc_pub_gemini_midiBriefing({usuario:OP_NOMBRE});
}

cargar();
</script></body></html>
