<style>

.app{min-height:100vh;padding:28px;display:flex;flex-direction:column;gap:18px}

ht:900}.mini-stat{border-radius:24px;padding:17px;background:rgba(255,255,255,.62);border:1px solid rgba(255,255,255,.66)}.mini-stat b{display:block;font-size:28px;line-height:1;letter-spacing:-.055em}.mini-stat span{display:block;margin-top:7px;font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.07em}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:18px;padding:12px 18px;font-weight:900;font-size:13px;transition:.15s}.btn.primary{background:linear-gradient(135deg,var(--coral),var(--coral2));color:#fff;box-shadow:0 12px 28px rgba(236,123,85,.23)}.btn.primary:hover{transform:translateY(-2px)}.btn.secondary{background:rgba(255,255,255,.68);color:var(--purple);border:1px solid rgba(255,255,255,.7)}.btn.danger{background:#fff1f1;color:var(--red)}.btn.small{padding:8px 12px;border-radius:14px;font-size:12px}.grid{display:grid;gap:14px}.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}.card{border-radius:28px;background:var(--card);border:1px solid rgba(255,255,255,.72);box-shadow:0 18px 55px rgba(72,53,68,.09);padding:20px}.card h3{font-size:18px;letter-spacing:-.04em;margin-bottom:6px}.muted{color:var(--muted)}.tiny{font-size:12px;color:var(--soft)}.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:8px 0 16px}.section-head h2{font-size:26px;letter-spacing:-.065em}.client-card{min-height:190px;display:flex;flex-direction:column}.client-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.avatar{width:48px;height:48px;border-radius:18px;background:linear-gradient(135deg,#f6bd75,var(--coral));display:grid;place-items:center;color:#fff;font-weight:900}.tag{display:inline-flex;align-items:center;gap:5px;padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.6);font-size:11px;font-weight:900;color:var(--muted)}.bar{height:9px;background:rgba(83,65,78,.09);border-radius:999px;padding:2px;margin-top:auto}.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--coral),#f4b45f)}.empty{padding:36px;border-radius:30px;background:rgba(255,250,242,.62);border:1px dashed rgba(83,65,78,.18);text-align:center;color:var(--muted)}
.form{display:grid;gap:12px}.field label{display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:6px}input,textarea,select{width:100%;border:1px solid rgba(83,65,78,.15);background:rgba(255,255,255,.68);border-radius:18px;padding:12px 13px;color:var(--ink);outline:none}textarea{min-height:92px;resize:vertical}input:focus,textarea:focus,select:focus{border-color:rgba(236,123,85,.55);box-shadow:0 0 0 4px rgba(236,123,85,.10);background:#fff}.tabs{display:flex;gap:4px;padding:5px;background:rgba(255,255,255,.58);border-radius:20px;margin-bottom:16px;overflow:auto}.tab{white-space:nowrap;padding:10px 13px;border-radius:16px;background:transparent;color:var(--muted);font-weight:900;font-size:12px}.tab.on{background:#fff;color:var(--green);box-shadow:0 8px 18px rgba(57,43,53,.08)}.out{background:#241c28;color:#f7f2ed;border-radius:20px;padding:16px;white-space:pre-wrap;font-family:"SFMono-Regular",Consolas,monospace;font-size:12px;line-height:1.6;max-height:360px;overflow:auto}.week{border-radius:22px;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.64);padding:16px}.check{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-top:1px solid rgba(83,65,78,.08)}.check:first-of-type{border-top:0}.box{width:19px;height:19px;border-radius:7px;border:2px solid rgba(83,65,78,.18);background:#fff;flex:0 0 auto}.check.done .box{background:var(--green);border-color:var(--green)}.check.done .box:after{content:"✓";color:#fff;font-weight:900;font-size:12px;display:grid;place-items:center}.check.done .ct{text-decoration:line-through;color:var(--soft)}
.modal-bg{position:fixed;inset:0;background:rgba(47,34,45,.42);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;backdrop-filter:blur(8px)}.modal-bg.show{display:flex}.modal{width:min(760px,100%);max-height:88vh;overflow:auto;border-radius:30px;background:rgba(255,250,242,.96);box-shadow:0 32px 100px rgba(34,24,32,.28);border:1px solid rgba(255,255,255,.72)}.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid rgba(83,65,78,.08)}.modal-body{padding:20px}.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid rgba(83,65,78,.08)}.toast{position:fixed;right:24px;bottom:24px;z-index:80;background:rgba(75,58,72,.94);color:#fff;border-radius:18px;padding:12px 16px;box-shadow:0 18px 50px rgba(34,24,32,.28);font-weight:800;font-size:13px;display:none}.toast.show{display:block}.loader{display:flex;align-items:center;gap:10px;color:var(--muted);padding:22px}.spin{width:17px;height:17px;border-radius:50%;border:2px solid rgba(83,65,78,.15);border-top-color:var(--coral);animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

</head>
<body>
<div class="app">
  <header class="top">
    <div class="logo">MC</div>
    <div class="brand">Monstruo Creativo</div>
    <div class="pill">Sistema SEO</div>
    <div class="top-right">
      <div class="status" id="status"><span class="dot"></span><span id="statusText">Iniciando...</span></div>
      <div class="role" id="roleTabs">
        <button type="button" data-role="rossio" class="on">Rossio</button>
        <button type="button" data-role="camila">Camila</button>
        <button type="button" data-role="lucy">Lucy</button>
      </div>
    </div>
  </header>
  <div class="shell">
    <aside class="side">
      <div class="nav-title">Principal</div>
      <button type="button" class="nav-btn on" data-nav="home"><span class="nav-ic">🏠</span>Vista general</button>
      <div class="nav-title">Flujo de cliente</div>
      <button type="button" class="nav-btn" data-nav="ficha"><span class="nav-ic">👤</span>Primera reunión</button>
      <button type="button" class="nav-btn" data-nav="proceso"><span class="nav-ic">📋</span>Proceso SEO</button>
      <button type="button" class="nav-btn" data-nav="kw"><span class="nav-ic">📊</span>Decisiones keywords</button>
      <div class="nav-title">Generadores</div>
      <button type="button" class="nav-btn" data-nav="tools"><span class="nav-ic">✨</span>Herramientas SEO</button>
      <button type="button" class="nav-btn" data-nav="prompt"><span class="nav-ic">🤖</span>Prompt IA manual</button>
      <button type="button" class="nav-btn" data-nav="cliente"><span class="nav-ic">👁</span>Vista del cliente</button>
      <div class="nav-title">SEO 2.0</div>
      <button type="button" class="nav-btn" data-nav="tareas"><span class="nav-ic">🧾</span>Tareas SEO</button>
      <button type="button" class="nav-btn" data-nav="contenidos"><span class="nav-ic">📝</span>Contenidos</button>
      <div class="client-list" id="clientList"></div>
      <div class="side-foot"><button type="button" class="btn primary" id="btnOpenAdd" style="width:100%">+ Agregar cliente</button></div>
    </aside>
    <main class="main"><div class="inner" id="main"><div class="loader"><span class="spin"></span>Cargando sistema SEO...</div></div></main>
  </div>
</div>
<div class="modal-bg" id="modalAdd" aria-hidden="true">
  <div class="modal">
    <div class="modal-head"><h3>Nuevo cliente SEO</h3><button type="button" class="btn secondary small" data-close="modalAdd">Cerrar</button></div>
    <div class="modal-body">
      <div class="form">
        <div class="field"><label>Empresa / marca</label><input id="fName" list="dlClientesMaster" placeholder="Busca una marca registrada en 👥 Clientes"><input id="fClientId" type="hidden"><input id="fClientRow" type="hidden"><input id="fClientExact" type="hidden"><div class="tiny" id="brandHint">Debe seleccionarse desde clientes ya registrados.</div></div>
        <div class="grid cols-2">
          <div class="field"><label>Sitio web</label><input id="fWeb" placeholder="https://dominio.com"></div>
          <div class="field"><label>Propiedad GSC</label><input id="fGsc" list="dlGscProps" placeholder="Se autoselecciona según dominio"><div class="tiny" id="gscHint">Leyendo propiedades de Search Console...</div></div>
        </div>
        <div class="grid cols-3">
          <div class="field"><label>Duración SEO</label><select id="fPlan"><option value="3">3 meses</option><option value="6">6 meses</option><option value="12">12 meses</option></select></div>
          <div class="field"><label>Especialista</label><select id="fSpec"><option value="rossio">Rossio</option><option value="camila">Camila</option><option value="lucy">Lucy</option></select></div>
          <div class="field"><label>Fecha de inicio</label><input id="fStart" type="date"></div>
        </div>
        <div class="grid cols-3">
          <div class="field"><label>Contacto</label><input id="fContact" placeholder="Nombre del contacto"></div>
          <div class="field"><label>Email</label><input id="fEmail" type="email" placeholder="cliente@dominio.com"></div>
          <div class="field"><label>WhatsApp</label><input id="fTel" placeholder="51999..."></div>
        </div>
        <div class="field"><label>Notas / accesos pendientes</label><textarea id="fNotes" placeholder="Objetivos, accesos pendientes, contexto inicial..."></textarea></div>
      </div>
    </div>
    <div class="modal-foot"><button type="button" class="btn secondary" data-close="modalAdd">Cancelar</button><button type="button" class="btn primary" id="btnSaveClient">Crear cliente</button></div>
  </div>
</div>
<datalist id="dlClientesMaster"></datalist>
<datalist id="dlGscProps"></datalist>
<div class="toast" id="toast"></div>
<script src="../assets/api.js"></script>
<script>

  var forcedSectionInit=envSection();if(forcedSectionInit)S.section=forcedSectionInit;

ibute('data-saving');btn.textContent='Crear cliente';}});}
  function deleteClient(id){if(!confirm('¿Eliminar este cliente del sistema SEO?'))return;api('proc_deleteClient',{clientId:id}).then(function(){S.clients=S.clients.filter(function(c){return c.id!==id;});if(S.activeId===id)S.activeId=S.clients[0]?S.clients[0].id:'';saveLocal();toast('Cliente eliminado');nav(S.section);});}
  function toggleCheck(el){var id=el.getAttribute('data-toggle'),w=el.getAttribute('data-week'),vid=el.getAttribute('data-vid');var c=S.clients.filter(function(x){return x.id===id;})[0];if(!c)return;if(!c.weeks)c.weeks={};if(!c.weeks[w])c.weeks[w]={};var done=!(c.weeks[w][vid]&&c.weeks[w][vid].done);c.weeks[w][vid]={done:done,date:new Date().toISOString()};api('proc_toggleVerif',{clientId:id,week:w,verifId:vid,done:String(done)});saveLocal();renderProceso();renderClientList();}
  function genFicha(){var c=activeClient();var txt='RESUMEN PRIMERA REUNIÓN SEO\n\nCliente: '+(c?c.name:'')+'\nWeb: '+(c?(c.siteUrl||''):'')+'\nObjetivo principal: '+($('briefObj').value||'')+'\nServicios clave: '+($('briefServ').value||'')+'\nAccesos o pendientes: '+($('briefAcc').value||'')+'\n\nSiguiente paso sugerido: validar accesos, levantar keywords principales y ordenar prioridades de la primera semana.';$('fichaOut').textContent=txt;}
  function saveFicha(){var c=activeClient();if(!c)return;c.objetivo=$('briefObj').value;c.servicios=$('briefServ').value;c.notas=$('briefAcc').value;api('proc_saveClient',{payload:JSON.stringify(c)});saveLocal();toast('Ficha guardada');}
  function genKw(){var list=($('kwList').value||'').split(',').map(function(x){return x.trim();}).filter(Boolean);var svc=$('kwServices').value||'';if(!list.length){toast('Agrega keywords');return;}var out='MAPA DE KEYWORDS\n\nCliente: '+($('kwClient').value||'')+'\nServicios clave: '+svc+'\n\n';list.forEach(function(k,i){var intent=i%3===0?'Transaccional':(i%3===1?'Informativa':'Local');var page=i%3===0?'Landing / servicio':(i%3===1?'Blog / guía':'Página local o sección de contacto');out+='- '+k+'\n  Intención: '+intent+'\n  Página recomendada: '+page+'\n  Acción: revisar volumen, competencia y página destino.\n\n';});$('kwOut').textContent=out;}
  function currentTool(){var b=document.querySelector('.tab.on');return b?b.getAttribute('data-tool'):'metas';}
  function genTool(){var type=currentTool(),name=$('toolName').value||'Tu negocio',kw=$('toolKw').value||'servicio principal',city=$('toolCity').value||'Lima',ctx=$('toolContext').value||'';var out='';if(type==='metas'){out='TÍTULOS SEO\n1. '+kw+' en '+city+' | '+name+'\n2. '+name+': '+kw+' profesional\n3. '+kw+' para empresas en '+city+'\n\nMETA DESCRIPTIONS\n1. Solicita '+kw+' en '+city+' con atención profesional, orientación clara y seguimiento desde el primer contacto.\n2. '+name+' te ayuda con '+kw+' mediante un proceso claro, ordenado y enfocado en resultados.\n3. Encuentra '+kw+' en '+city+' y recibe una propuesta adaptada a tu necesidad.';}else if(type==='faqs'){out='FAQS\n1. ¿Qué incluye '+kw+'?\nIncluye revisión del caso, recomendaciones y una solución adaptada a la necesidad del cliente.\n\n2. ¿Por qué elegir '+name+'?\nPorque ofrece atención clara, seguimiento y orientación profesional.\n\n3. ¿Cómo solicito información?\nComparte tu caso por el canal de contacto y el equipo te indicará los siguientes pasos.\n\nSCHEMA FAQPage: crear JSON-LD con estas preguntas y respuestas.';}else if(type==='schema'){out=JSON.stringify({'@context':'https://schema.org','@type':'LocalBusiness','name':name,'description':ctx||kw,'address':{'@type':'PostalAddress','addressLocality':city,'addressCountry':'PE'}},null,2);}else{out='POSTS GOOGLE BUSINESS PROFILE\n\nSemana 1: '+name+' te ayuda con '+kw+' en '+city+'. Escríbenos para recibir orientación.\n\nSemana 2: Si buscas '+kw+', revisamos tu caso y te indicamos los siguientes pasos.\n\nSemana 3: Mejora tu decisión con atención clara y seguimiento profesional.\n\nSemana 4: Cierra el mes avanzando con '+kw+' junto a '+name+'.';}$('toolOut').textContent=out;}
  function genPrompt(){var type=$('promptType').value,client=$('promptClient').value||'cliente',web=$('promptWeb').value||'',ctx=$('promptCtx').value||'';var map={metas:'crear títulos SEO y meta descriptions',faqs:'crear FAQs y schema FAQPage',landing:'redactar copy para una landing page',articulo:'crear un brief de artículo SEO',gbp:'crear publicaciones para Google Business Profile',auditoria:'hacer una auditoría SEO rápida',keywords:'crear un mapa de keywords'};var out='Actúa como especialista SEO senior. Necesito '+map[type]+' para el siguiente cliente.\n\nCliente: '+client+'\nWeb: '+web+'\nContexto: '+ctx+'\n\nRequisitos:\n- Escribe en español latino.\n- Prioriza intención de búsqueda y conversión.\n- Evita promesas exageradas.\n- Entrega resultado ordenado y listo para revisar.\n- Incluye recomendaciones prácticas cuando aplique.\n\nFormato esperado:\n1. Resultado principal.\n2. Justificación breve.\n3. Recomendaciones de implementación.\n4. Checklist final.';$('promptOut').textContent=out;}
  function copyText(id){var el=$(id);var txt=el?el.textContent:'';if(!txt)return;navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(txt).then(function(){toast('Copiado');}):toast('Selecciona y copia manualmente');}
  function bind(){document.addEventListener('input',function(e){if(e.target&&e.target.id==='fName'){var m=findMasterByName(e.target.value,true);if(m)applyMasterClient(m);else{if($('fClientId'))$('fClientId').value='';if($('fClientRow'))$('fClientRow').value='';if($('fClientExact'))$('fClientExact').value='';if($('brandHint'))$('brandHint').textContent='Elige una coincidencia exacta del buscador de clientes.';}}if(e.target&&e.target.id==='fWeb')updateGscGuess();});document.addEventListener('change',function(e){if(e.target&&e.target.id==='fName'){var m=findMasterByName(e.target.value,true);if(m)applyMasterClient(m);}if(e.target&&e.target.id==='fWeb')refreshGscProperties(e.target.value);if(e.target&&e.target.id==='fPlan'&&$('fNotes')){$('fNotes').placeholder='Objetivos, accesos pendientes, contexto inicial. Duración seleccionada: '+e.target.value+' meses';}});document.addEventListener('click',function(e){var t=e.target.closest('button,[data-toggle],.check');if(!t)return;var navv=t.getAttribute('data-nav');if(navv){nav(navv);return;}var role=t.getAttribute('data-role');if(role){S.role=role;paintNav();nav('home');return;}var oid=t.getAttribute('data-open-client');if(oid){S.activeId=oid;nav('proceso');return;}var did=t.getAttribute('data-delete-client');if(did){deleteClient(did);return;}if(t.id==='btnOpenAdd'||t.id==='heroAdd'||t.id==='emptyAdd'){openModal('modalAdd');return;}var rid=t.getAttribute('data-renew-client');if(rid){renewClient(rid);return;}if(t.id==='btnSaveClient'){if(t.disabled||t.getAttribute('data-saving')==='1')return;saveClient();return;}var close=t.getAttribute('data-close');if(close){closeModal(close);return;}if(t.classList.contains('tab')){Array.prototype.forEach.call(document.querySelectorAll('.tab'),function(x){x.classList.remove('on');});t.classList.add('on');return;}var tog=t.closest('[data-toggle]');if(tog){toggleCheck(tog);return;}if(t.id==='reloadBtn'){loadData();return;}if(t.id==='genFicha'){genFicha();return;}if(t.id==='saveFichaLocal'){saveFicha();return;}if(t.id==='genKw'){genKw();return;}if(t.id==='genTool'){genTool();return;}if(t.id==='genPrompt'){genPrompt();return;}if(t.id==='saveSimple'){toast('Guardado como nota visual');return;}var cp=t.getAttribute('data-copy');if(cp){copyText(cp);return;}});}
  function applyClientState(r,label){
    var data=(r&&r.data)?r.data:r;
    var clients=[];
    if(data&&Array.isArray(data.clients)) clients=data.clients;
    else if(r&&Array.isArray(r.clients)) clients=r.clients;
    S.clients=clients||[];
    S.masterClients=(r&&(r.catalog||r.masterClients))||S.masterClients||[];
    var fr=envRole();
    S.context=fr?{role:fr,locked:fr!=='rossio',isMaster:false,source:(window.MC_SEO_OPERATIVE?'operativa':'url')}:((r&&r.context)||S.context);
    S.lockRole=!!(S.context&&S.context.locked);
    if(S.lockRole||fr)S.role=S.context.role||S.role;
    S.connected=true;
    S.mode=hasServer()?'interno':'web';
    setStatus(S.lockRole?'Conectado interno · '+specLabel(S.role):(label||'Conectado interno'),true);
  }
  function loadCatalogFallback(){
    return api('seo2_clientes_buscar',{q:'',limit:'1000'}).then(function(r){
      var items=(r&&(r.items||r.clientes||r.clients))||[];
      if(Array.isArray(items)&&items.length){S.masterClients=items.map(function(c){return {id:c.id||c.marca||c.cliente||'',row:c.row||'',marca:c.marca||c.cliente||c.name||'',name:c.marca||c.cliente||c.name||'',web:c.web||c.siteUrl||'',contacto:c.contacto||'',telefono:c.telefono||c.tel||'',email:c.email||c.correo||'',correo:c.correo||c.email||'',servicio:c.servicio||c.plan||'',estado:c.estado||'',responsable:c.responsable||''};});}
      return S.masterClients;
    });
  }
  function finishLoad(){
    fillDatalists();
    if(!S.activeId&&roleClients()[0])S.activeId=roleClients()[0].id;
    var initWeb=(activeClient()&&(activeClient().siteUrl||activeClient().web))||'';
    if(S.gscProperties&&S.gscProperties.length){fillDatalists();updateGscGuess();}
    refreshGscProperties(initWeb);
    api('proc_getSchema',{}).then(function(x){if(x&&x.ok!==false&&Array.isArray(x.weeks)&&x.weeks.length)S.weeks=x.weeks;paintNav();nav(S.section);});
    paintNav();nav(S.section);
  }
  function loadData(){
    setStatus(hasServer()?'Conectando backend...':'Conectando...',true);
    api('proc_getClients',{}).then(function(r){
      if(r&&r.ok!==false&&Array.isArray(r.clients)){
        applyClientState(r,'Conectado interno');
        if(Array.isArray(r.gscProperties)){S.gscProperties=r.gscProperties;S.gscError=r.gscOk===false?(r.gscMsg||'No se pudo leer Search Console.'):'';}
        loadCatalogFallback().then(function(){finishLoad();});
        return;
      }
      var err=(r&&r.error)?String(r.error):'';
      api('seoSistemaGet',{}).then(function(fb){
        if(fb&&fb.ok!==false&&fb.data&&Array.isArray(fb.data.clients)){
          applyClientState(fb,'Conectado parcial');
          loadCatalogFallback().then(function(){
            if(err) toast('Backend parcial: falta actualizar master_v3.gs');
            finishLoad();
          });
          return;
        }
        S.clients=loadLocal();S.connected=false;setStatus('Modo local seguro',true);if(err)toast('Usando modo local: '+err);finishLoad();
      });
    });
  }
  bind();
  loadData();
})();
</script>
