<!DOCTYPE html><html><head><base target="_top"><meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F1F5F9;--surface:#fff;--border:#E8ECF0;--text:#0F172A;--muted:#64748B;--faint:#94A3B8;--v:#7C3AED;--green:#059669;--amber:#D97706;--red:#DC2626;--blue:#0284C7}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.toolbar{background:#0F172A;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.toolbar h1{font-size:14px;font-weight:700;color:#FDE68A}
.toolbar-right{display:flex;gap:8px;align-items:center}
.mes-sel{padding:5px 9px;border:none;border-radius:7px;font-size:11px;background:rgba(255,255,255,.15);color:#fff;cursor:pointer}
.mes-sel option{background:#0F172A}
.btn-pdf{background:var(--v);color:#fff;border:none;border-radius:7px;padding:7px 14px;cursor:pointer;font-size:11px;font-weight:600}
.btn-ref{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:7px;padding:6px 11px;cursor:pointer;font-size:11px}
#report{padding:18px;max-width:820px;margin:0 auto}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px}
@media print{.toolbar{display:none!important}#report{padding:10px;max-width:100%}}

/* Encabezado del reporte */
.rep-hdr{text-align:center;padding:20px 0 18px;border-bottom:3px solid var(--v);margin-bottom:18px}
.rep-agencia{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.rep-mes{font-size:22px;font-weight:800;color:var(--text)}
.rep-gen{font-size:11px;color:var(--muted);margin-top:4px}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kpi-n{font-size:24px;font-weight:800;color:var(--v);line-height:1}
.kpi-n.green{color:var(--green)}.kpi-n.amber{color:var(--amber)}.kpi-n.blue{color:var(--blue)}
.kpi-l{font-size:10px;color:var(--muted);margin-top:4px}

/* Sección */
.sec{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sec-title{font-size:12px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;color:var(--text)}
.sec-title span{font-size:10px;background:var(--bg);padding:2px 8px;border-radius:999px;color:var(--muted)}

/* Tabla */
.tabla{width:100%;border-collapse:collapse;font-size:12px}
.tabla th{background:var(--bg);padding:6px 10px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--faint)}
.tabla td{padding:7px 10px;border-bottom:1px solid var(--bg);color:var(--text)}
.tabla tr:last-child td{border-bottom:none}
.tabla tr:hover td{background:#FAFBFC}

/* SLA */
.sla-bar{height:8px;border-radius:4px;background:var(--bg);margin-top:6px;overflow:hidden}
.sla-fill{height:8px;border-radius:4px;transition:.3s}
.sla-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bg);font-size:12px}
.sla-item:last-child{border-bottom:none}
.sla-pct{font-weight:700;font-size:13px}

/* Estado badge */
.est{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:9px;font-weight:700}
.est.ok{background:#D1FAE5;color:#065F46}
.est.pend{background:#DBEAFE;color:#1E40AF}
.est.late{background:#FEE2E2;color:#991B1B}
</style></head><body>
<div class="toolbar">
  <h1>📊 Reporte Mensual</h1>
  <div class="toolbar-right">
    <select class="mes-sel" id="selMes" onchange="cargar()"></select>
    <button class="btn-ref" onclick="cargar()">↻</button>
    <button class="btn-pdf" onclick="window.print()">🖨️ PDF</button>
  </div>
</div>
<div id="report"><div class="loading">Selecciona el mes para cargar el reporte.</div></div>

<script src="../assets/api.js"></script>
<script>
function esc(x){return String(x||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

// Meses selector
(function(){
  var sel=document.getElementById('selMes'),now=new Date();
  for(var i=0;i<=5;i++){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    var v=d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1);
    var opt=document.createElement('option');
    opt.value=v;opt.textContent=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()]+' '+d.getFullYear();
    if(i===1)opt.selected=true;
    sel.appendChild(opt);
  }
})();

function cargar(){
  var mes=document.getElementById('selMes').value;
  document.getElementById('report').innerHTML='<div class="loading">Generando reporte...</div>';
  google.script.run.withSuccessHandler(render).withFailureHandler(function(e){
    document.getElementById('report').innerHTML='<div class="loading">Error: '+esc(e.message)+'</div>';
  }).mc_pub_v2436_getKpis(mes);
}

function render(data){
  if(!data||data.ok===false){document.getElementById('report').innerHTML='<div class="loading">Error al cargar datos</div>';return;}
  var k=data.kpi||{}, mes=data.mes||document.getElementById('selMes').value;
  var mesArr=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var mesLbl=mesArr[parseInt(mes.split('-')[1])-1]+' '+mes.split('-')[0];

  var html='<div class="rep-hdr">'+
    '<div class="rep-agencia">Agencia Monstruo Creativo — Reporte interno</div>'+
    '<div class="rep-mes">'+mesLbl+'</div>'+
    '<div class="rep-gen">Generado: '+new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'})+'</div></div>';

  // KPIs principales
  var slaD=k.slaCompliance||{};
  var slaPct=slaD.total?Math.round(slaD.dentroSLA/slaD.total*100):null;
  var byTipo=k.soporteXTipo||{};
  var tiempoTot=Object.keys(byTipo).reduce(function(a,t){return a+(byTipo[t].total||0);},0);
  html+='<div class="kpi-grid">'+
    kpiCard(k.ticketsEntrados||0,'Tickets soporte','','')+
    kpiCard(k.ticketsResueltos||0,'Tickets resueltos','green','')+
    kpiCard(tiempoTot?Math.round(tiempoTot/60)+'h':'—','Horas soporte','blue','')+
    kpiCard(slaPct!==null?slaPct+'%':'—','SLA cumplido',slaPct===null?'':slaPct>=90?'green':slaPct>=70?'amber':'red','')+
  '</div>';

  // Soporte por tipo
  if(Object.keys(byTipo).length){
    html+='<div class="sec"><div class="sec-title">🛠️ Soporte por tipo <span>'+Object.keys(byTipo).length+' categorías</span></div>'+
      '<table class="tabla"><thead><tr><th>Tipo</th><th>Tickets</th><th>Horas</th><th>Promedio</th></tr></thead><tbody>';
    Object.keys(byTipo).sort(function(a,b){return byTipo[b].count-byTipo[a].count;}).forEach(function(t){
      var d=byTipo[t];
      html+='<tr><td>'+esc(t)+'</td><td><b>'+d.count+'</b></td><td>'+Math.round((d.total||0)/60)+'h</td><td>'+Math.round((d.total||0)/Math.max(d.count,1))+'min</td></tr>';
    });
    html+='</tbody></table></div>';
  }

  // Tiempo por persona
  var byPers=k.tiempoXPersona||{};
  if(Object.keys(byPers).length){
    html+='<div class="sec"><div class="sec-title">👥 Tiempo por persona</div>'+
      '<table class="tabla"><thead><tr><th>Persona</th><th>Ítems</th><th>Horas</th></tr></thead><tbody>';
    Object.keys(byPers).forEach(function(p){
      var d=byPers[p];
      html+='<tr><td>'+esc(p)+'</td><td>'+d.count+'</td><td>'+Math.round((d.total||0)/60)+'h</td></tr>';
    });
    html+='</tbody></table></div>';
  }

  // SLA por prioridad
  var byPrio=k.slaXPrioridad||{};
  if(Object.keys(byPrio).length){
    html+='<div class="sec"><div class="sec-title">📊 SLA por prioridad</div>';
    ['Urgente','Alta','Media','Baja'].forEach(function(p){
      var d=byPrio[p];if(!d||!d.total)return;
      var pct=Math.round(d.dentroSLA/d.total*100);
      var col=pct>=90?'#059669':pct>=70?'#D97706':'#DC2626';
      html+='<div class="sla-item"><div style="flex:1"><b>'+esc(p)+'</b><div class="sla-bar"><div class="sla-fill" style="width:'+pct+'%;background:'+col+'"></div></div></div>'+
        '<div class="sla-pct" style="color:'+col+';margin-left:12px">'+pct+'%</div></div>';
    });
    html+='</div>';
  }

  // Bloqueos
  var bloq=k.bloqueos||{};
  if(Object.keys(bloq).length&&Object.values(bloq).some(function(v){return v>0;})){
    html+='<div class="sec"><div class="sec-title">🚫 Bloqueos del mes</div>'+
      '<table class="tabla"><thead><tr><th>Tipo</th><th>Cantidad</th></tr></thead><tbody>';
    Object.keys(bloq).forEach(function(b){if(bloq[b]) html+='<tr><td>'+esc(b)+'</td><td>'+bloq[b]+'</td></tr>';});
    html+='</tbody></table></div>';
  }

  document.getElementById('report').innerHTML=html;
}

function kpiCard(n,l,cls){
  return '<div class="kpi-card"><div class="kpi-n '+(cls||'')+'">'+n+'</div><div class="kpi-l">'+esc(l)+'</div></div>';
}
cargar();
</script></body></html>
