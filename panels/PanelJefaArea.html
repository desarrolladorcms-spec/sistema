<!doctype html><html><head><base target="_top"><meta charset="utf-8"><style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#f6f3ff;color:#111827}.top{padding:22px 26px;background:linear-gradient(120deg,#1A0A36,#5b21b6,#9333ea);color:#fff}.title{font-size:22px;font-weight:950}.sub{font-size:12px;opacity:.82;margin-top:4px}.wrap{padding:18px 22px}.kpis{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:10px;margin-bottom:16px}.kpi{background:#fff;border:1px solid #e9d5ff;border-radius:18px;padding:14px;box-shadow:0 10px 24px rgba(88,28,135,.08)}.kpi b{font-size:28px;color:#6d28d9;display:block}.kpi span{font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase}.grid{display:grid;grid-template-columns:1.1fr 1fr;gap:14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;box-shadow:0 10px 28px rgba(15,23,42,.07);overflow:hidden}.card h3{margin:0;padding:14px 16px;background:#fff;border-bottom:1px solid #f1f5f9;font-size:14px;color:#32115c}.list{padding:10px 12px;max-height:330px;overflow:auto}.item{border:1px solid #f1f5f9;border-radius:14px;padding:11px;margin-bottom:8px;background:#fbfbff}.item-title{font-weight:900;font-size:13px}.meta{font-size:11px;color:#64748b;margin-top:3px}.pill{display:inline-block;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:900;margin-right:4px}.alta{background:#fee2e2;color:#b91c1c}.media{background:#fef3c7;color:#92400e}.baja{background:#dcfce7;color:#166534}.empty{padding:28px;text-align:center;color:#94a3b8;border:1px dashed #ddd6fe;border-radius:14px;background:#faf5ff}.loading{padding:42px;text-align:center;color:#6d28d9}.actions{display:flex;gap:8px;justify-content:flex-end;margin-bottom:14px}.btn{border:0;border-radius:12px;padding:10px 14px;background:#7c3aed;color:#fff;font-weight:900;cursor:pointer}.btn.sec{background:#16a34a}@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}
</style></head><body><div class="top"><div class="title">🧠 Panel Jefa de Área</div><div class="sub">Resumen operativo para decidir rápido: riesgos, oportunidades, carga y pendientes.</div></div><div class="wrap"><div class="actions"><button class="btn" onclick="load()">↻ Actualizar</button><button class="btn sec" onclick="google.script.run.mc_pub_v23_abrirWArapido()">📲 WhatsApp</button></div><div id="app" class="loading">Cargando panel...</div></div><script src="../assets/api.js"></script>
<script>
function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]})}
function pill(v){var c=/alta|urgente/i.test(v)?'alta':/baja|verde/i.test(v)?'baja':'media';return '<span class="pill '+c+'">'+esc(v||'Media')+'</span>'}
function list(title,items,render,empty){items=items||[];var h='<div class="card"><h3>'+title+' ('+items.length+')</h3><div class="list">';if(!items.length)h+='<div class="empty">'+empty+'</div>';items.slice(0,30).forEach(function(x){h+='<div class="item">'+render(x)+'</div>'});return h+'</div></div>'}
function render(d){if(!d||d.ok===false){document.getElementById('app').innerHTML='<div class="empty">'+esc(d&&d.msg||'No se pudo cargar')+'</div>';return}var m=d.metricas||{};var html='<div class="kpis">'+['clientes','tareasPendientes','soportePendiente','riesgos','oportunidades','whatsapp'].map(function(k){return '<div class="kpi"><b>'+esc(m[k]||0)+'</b><span>'+esc(k)+'</span></div>'}).join('')+'</div>';html+='<div class="grid">';html+=list('🚨 Riesgos prioritarios',d.riesgos,function(x){return '<div>'+pill(x.nivel)+'<span class="item-title">'+esc(x.cliente||'Sin cliente')+'</span></div><div class="meta">'+esc(x.riesgo||'')+' · '+esc(x.accion||'')+'</div>'},'Sin riesgos críticos detectados.');html+=list('💼 Oportunidades operativas',d.oportunidades,function(x){return '<div>'+pill(x.prioridad)+'<span class="item-title">'+esc(x.cliente||'')+'</span></div><div class="meta">'+esc(x.oportunidad||'')+' · '+esc(x.servicio||'')+'</div>'},'Sin oportunidades automáticas pendientes.');html+=list('🧩 Decisiones pendientes',d.decisiones,function(x){return '<div>'+pill(x.prioridad)+'<span class="item-title">'+esc(x.titulo||x.tipo||'Pendiente')+'</span></div><div class="meta">'+esc(x.cliente||'')+' · '+esc(x.accion||'')+'</div>'},'Sin decisiones pendientes.');html+=list('⚖️ Carga / resumen',((d.carga&&d.carga.items)||[]),function(x){return '<div><span class="item-title">'+esc(x.responsable||x.nombre||'Responsable')+'</span></div><div class="meta">'+esc(JSON.stringify(x))+'</div>'},'Sin datos de carga.');html+='</div>';document.getElementById('app').innerHTML=html}
function load(){document.getElementById('app').innerHTML='<div class="loading">Cargando panel...</div>';google.script.run.withSuccessHandler(render).withFailureHandler(function(e){render({ok:false,msg:e.message})}).mc_panelJefa_getData_pub()}load();
</script></body></html>
