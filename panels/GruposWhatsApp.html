<!DOCTYPE html>
<html><head><base target="_top"><meta charset="UTF-8">
<style>
body{font-family:Inter,Arial,sans-serif;margin:0;background:#f8fafc;color:#1f2937}.wrap{padding:22px}h1{margin:0 0 6px;font-size:24px;color:#4c1d95}p{color:#64748b}button{background:#7c3aed;color:white;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;margin:4px}button.sec{background:#0f766e}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:10px;padding:10px;margin:6px 0 12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.card{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:14px;box-shadow:0 8px 20px rgba(15,23,42,.06)}.metric{font-size:28px;font-weight:800;color:#6d28d9}table{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden}th,td{padding:9px;border-bottom:1px solid #eee;text-align:left;font-size:12px;vertical-align:top}th{background:#1a0a36;color:#fde68a}.bad{color:#dc2626;font-weight:800}.ok{color:#059669;font-weight:800}.muted{color:#64748b}pre{white-space:pre-wrap;background:#111827;color:#e5e7eb;padding:12px;border-radius:12px;overflow:auto}
</style></head><body><div class="wrap"><h1>💬 Grupos WhatsApp</h1><p>Clientes, grupos y responsables de comunicación.</p><div><button onclick="document.getElementById('form').style.display='block'">Nuevo grupo</button><div id="form" class="card" style="display:none"><input id="cliente" placeholder="Cliente"><input id="nombre" placeholder="Nombre grupo"><input id="link" placeholder="Link grupo"><select id="area"><option>Web</option><option>SEO</option><option>Soporte</option><option>Campañas</option></select><button onclick="saveGrupo()">Guardar</button></div><script src="../assets/api.js"></script>
<script>function saveGrupo(){google.script.run.withSuccessHandler(function(r){alert(r.msg);load();}).mc_gruposWA_guardar_pub({cliente:cliente.value,nombre:nombre.value,link:link.value,area:area.value});}</script></div><div id="out"><p>Cargando...</p></div></div>
<script>
function esc(x){return String(x==null?'':x).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function draw(data){
  var out=document.getElementById('out');
  if(!data||data.ok===false){out.innerHTML='<div class="card bad">'+esc(data&&data.msg||'Error')+'</div>';return;}
  var html='';
  if(Array.isArray(data.items)){ html+='<table><thead><tr>'; var keys=Object.keys(data.items[0]||{}); keys.forEach(k=>html+='<th>'+esc(k)+'</th>'); html+='</tr></thead><tbody>'; data.items.forEach(r=>{html+='<tr>'; keys.forEach(k=>html+='<td>'+esc(r[k])+'</td>'); html+='</tr>';}); html+='</tbody></table>'; }
  else { html+='<div class="grid">'; Object.keys(data).forEach(k=>{ if(k==='ok')return; var v=data[k]; if(Array.isArray(v)) html+='<div class="card"><b>'+esc(k)+'</b><div class="metric">'+v.length+'</div></div>'; else if(typeof v==='object'&&v!==null) html+='<div class="card"><b>'+esc(k)+'</b><pre>'+esc(JSON.stringify(v,null,2))+'</pre></div>'; else html+='<div class="card"><b>'+esc(k)+'</b><div class="metric">'+esc(v)+'</div></div>'; }); html+='</div>'; }
  out.innerHTML=html||'<div class="card">Sin datos.</div>';
}
function load(){google.script.run.withSuccessHandler(draw).withFailureHandler(e=>draw({ok:false,msg:e.message})).mc_gruposWA_getData_pub();}
load();
</script>
<script>
(function(){
  if(window.__cmsVisualNotifyInstalled) return;
  window.__cmsVisualNotifyInstalled = true;
  function ensureNotify(){
    var cssId='cmsNotifyCss';
    if(!document.getElementById(cssId)){
      var st=document.createElement('style'); st.id=cssId;
      st.textContent='.cms-notify-overlay{position:fixed;inset:0;background:rgba(15,23,42,.48);display:none;align-items:center;justify-content:center;z-index:99999;padding:22px}.cms-notify-card{width:min(460px,calc(100vw - 44px));background:rgba(255,255,255,.96);border:1px solid rgba(255,255,255,.75);box-shadow:0 26px 85px rgba(15,23,42,.28);border-radius:28px;padding:26px;text-align:center;font-family:Arial,sans-serif;color:#1f2937}.cms-notify-icon{width:74px;height:74px;border-radius:999px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,#ede9fe,#dbeafe);box-shadow:0 12px 34px rgba(124,58,237,.22)}.cms-notify-title{font-size:23px;font-weight:900;margin:0 0 7px;color:#111827}.cms-notify-msg{font-size:14px;line-height:1.55;color:#64748b;white-space:pre-line;margin:0 0 18px}.cms-notify-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.cms-notify-btn{border:0;border-radius:15px;padding:12px 20px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#7c3aed,#9333ea);color:#fff;box-shadow:0 14px 26px rgba(124,58,237,.24)}.cms-notify-btn.secondary{background:#fff;color:#4c1d95;border:1px solid #e5e7eb;box-shadow:0 10px 22px rgba(15,23,42,.08)}';
      document.head.appendChild(st);
    }
    var ov=document.getElementById('cmsNotifyOverlay');
    if(!ov){
      ov=document.createElement('div'); ov.id='cmsNotifyOverlay'; ov.className='cms-notify-overlay';
      ov.innerHTML='<div class="cms-notify-card"><div class="cms-notify-icon" id="cmsNotifyIcon">✅</div><h2 class="cms-notify-title" id="cmsNotifyTitle">Listo</h2><p class="cms-notify-msg" id="cmsNotifyMsg"></p><div class="cms-notify-actions" id="cmsNotifyActions"><button class="cms-notify-btn" id="cmsNotifyOk">Aceptar</button></div></div>';
      document.body.appendChild(ov);
    }
    return ov;
  }
  window.cmsNotify=function(msg, opts){
    opts=opts||{}; var ov=ensureNotify();
    document.getElementById('cmsNotifyIcon').textContent=opts.icon||'✅';
    document.getElementById('cmsNotifyTitle').textContent=opts.title||'Listo';
    document.getElementById('cmsNotifyMsg').textContent=String(msg||'');
    var actions=document.getElementById('cmsNotifyActions');
    actions.innerHTML='';
    var ok=document.createElement('button'); ok.className='cms-notify-btn'; ok.textContent=opts.okText||'Aceptar';
    ok.onclick=function(){ov.style.display='none'; if(typeof opts.onOk==='function') opts.onOk();};
    actions.appendChild(ok);
    if(opts.cancelText){ var c=document.createElement('button'); c.className='cms-notify-btn secondary'; c.textContent=opts.cancelText; c.onclick=function(){ov.style.display='none'; if(typeof opts.onCancel==='function') opts.onCancel();}; actions.insertBefore(c,ok); }
    ov.style.display='flex';
  };
  window.alert=function(msg){ window.cmsNotify(msg,{title:'Aviso del sistema', icon:'🔔'}); };
})();
</script>

</body></html>
