<!doctype html><html><head><base target="_top"><meta charset="utf-8"><style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#f0fdf4;color:#111827}.top{padding:22px 26px;background:linear-gradient(120deg,#052e16,#15803d,#22c55e);color:#fff}.title{font-size:22px;font-weight:950}.sub{font-size:12px;opacity:.85}.wrap{padding:18px 22px}.toolbar{display:flex;justify-content:space-between;gap:10px;margin-bottom:14px}.btn{border:0;border-radius:12px;background:#16a34a;color:#fff;font-weight:900;padding:10px 14px;cursor:pointer}.btn.alt{background:#7c3aed}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.kpi{background:#fff;border:1px solid #bbf7d0;border-radius:16px;padding:12px}.kpi b{display:block;font-size:28px;color:#15803d}.kpi span{font-size:11px;color:#166534;font-weight:900;text-transform:uppercase}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}.card{background:#fff;border:1px solid #bbf7d0;border-radius:18px;padding:14px;box-shadow:0 10px 22px rgba(22,101,52,.08)}.client{font-weight:950;color:#14532d;font-size:15px}.pill{display:inline-block;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:900;margin-right:4px}.Alta{background:#fee2e2;color:#b91c1c}.Media{background:#fef3c7;color:#92400e}.Baja{background:#dcfce7;color:#166534}.service{background:#dcfce7;color:#166534}.opp{font-weight:850;margin-top:8px}.meta{font-size:12px;color:#64748b;line-height:1.45;margin-top:5px}.wa{margin-top:10px;border:0;border-radius:10px;background:#25D366;color:#fff;font-weight:900;padding:8px 10px;cursor:pointer}.empty,.loading{text-align:center;padding:46px;color:#166534;background:#fff;border:1px dashed #86efac;border-radius:18px}@media(max-width:800px){.kpis{grid-template-columns:1fr 1fr}.toolbar{display:block}.btn{margin:4px 0}}
</style></head><body><div class="top"><div class="title">💼 Oportunidades Operativas</div><div class="sub">Ideas útiles para mejorar atención o activar servicios complementarios. No usa precios ni historial comercial.</div></div><div class="wrap"><div class="toolbar"><button class="btn" onclick="load()">↻ Actualizar</button><button class="btn alt" onclick="parent.go('CentroWhatsApp','📲','WhatsApp')">📲 Abrir centro WhatsApp</button></div><div id="app" class="loading">Analizando oportunidades...</div></div><script src="../assets/api.js"></script>
<script>
function esc(s){return String(s==null?'':s).replace(/[&<>\"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]})}function wa(item){var msg='Buen día 👋\nLe escribimos de Monstruo Creativo porque revisando su operación vimos esta oportunidad:\n\n'+(item.oportunidad||'Mejora operativa')+'\nServicio sugerido: '+(item.servicio||'')+'\nMotivo: '+(item.motivo||'')+'\n\n¿Desea que lo revisemos juntas?';parent.go('CentroWhatsApp','📲','WhatsApp')}
function render(d){if(!d||d.ok===false){app.innerHTML='<div class="empty">'+esc(d&&d.msg||'No se pudo cargar')+'</div>';return}var items=d.items||[];var alta=items.filter(function(x){return x.prioridad==='Alta'}).length,media=items.filter(function(x){return x.prioridad==='Media'}).length;var html='<div class="kpis"><div class="kpi"><b>'+items.length+'</b><span>Total</span></div><div class="kpi"><b>'+alta+'</b><span>Alta</span></div><div class="kpi"><b>'+media+'</b><span>Media</span></div><div class="kpi"><b>'+new Set(items.map(function(i){return i.cliente})).size+'</b><span>Clientes</span></div></div>';if(!items.length){app.innerHTML=html+'<div class="empty">✅ Sin oportunidades pendientes por ahora.</div>';return}html+='<div class="grid">';items.forEach(function(x){html+='<div class="card"><div class="client">'+esc(x.cliente||'')+'</div><div style="margin-top:6px"><span class="pill '+esc(x.prioridad||'Media')+'">'+esc(x.prioridad||'Media')+'</span><span class="pill service">'+esc(x.servicio||'Servicio sugerido')+'</span></div><div class="opp">'+esc(x.oportunidad||'Oportunidad')+'</div><div class="meta">'+esc(x.motivo||'')+'</div><button class="wa" onclick=\'wa('+JSON.stringify(x).replace(/'/g,'&#39;')+')\'>📲 Preparar WhatsApp</button></div>'});html+='</div>';app.innerHTML=html}
function load(){app.innerHTML='<div class="loading">Analizando oportunidades...</div>';google.script.run.withSuccessHandler(render).withFailureHandler(function(e){render({ok:false,msg:e.message})}).mc_oportunidades_getData_pub()}load();
</script></body></html>
